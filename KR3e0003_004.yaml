front:
  text: 王翰林集註黃帝八十一難經卷之四
  hash: sha256:ed60549be7a4db994796c3e7572a8c3b66eb66c83fcf9d02d8b5493746212c09
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0003_SBCK_004-1a}
body:
  text: 盧國秦越人撰呂廣德用楊玄操虞庶楊康侯註解王九思王鼎象石友諒王惟一校正附音釋四十難曰經言肝主色虞曰肝木也木之華蕚敷布五色故主色也心主臭虞曰心火也火之化物五臭出焉是故五臭心獨主之也脾主味虞曰脾土也土甘甘受味故主味禮云甘受和味此義也肺主聲虞曰肺金也金擊之有聲故五音皆出於肺也腎主液虞曰腎水也水流濕主液也鼻者肺之候而反知香臭耳者腎之候而反聞聲其意何也然肺者西方金也金生於巳巳者南方火也火者心心主臭故令鼻知香臭腎者北方水也水生於申申者西方金金者肺肺主聲故令耳聞聲楊曰五行有相因成事有當體成事者至如肺腎二藏相因成也其餘三藏自成之也四十一難曰肝獨有兩葉以何應也然肝者東方木也木者春也虞曰在五常木法春應仁故云木者春也人之仁發用也萬物始生其尚㓜小虞曰肝水足厥隂配膽木足少陽少陽之至乍大乍少乍短乍長故云㓜少意無所親虞曰木者應春法仁施恩無求報不以親而施化育故曰意無所親去太隂尚近虞曰十二經相注足厥陰還復注手太隂故曰去太隂尚近也離太陽不遠虞曰本經言足厥隂少陽木生手太陽少隂火故云離太陽不遠則此義也猶有兩心虞曰猶如也如有兩心者謂注於太隂有畏金之心生於太陽有生火之心故云猶有兩心故有兩葉亦應木葉也楊曰肝者㨿大葉言之則是兩葉也若㨿小葉言之則多葉矣解在後章丁曰經言肝者東方木也應春萬物之所生其尚㓜小然始生者非長生也謂木初受氣是言㓜少也意無所親者謂以失其父未識其母故曰意無所親也去太隂尚近太隂是七月木始受氣離太陽不遠也太陽是六月故言離太陽不遠也猶有兩心者爲離太陽戀太隂有此離戀故言兩心也所以肝有兩葉以應木葉也四十二難曰人膓胃長短受水榖多少各幾何然胃大一尺五寸徑五寸長二尺六寸横屈受水穀三斗五升其中常留穀二斗水一斗五升楊曰凡人食入於口而聚於胃故經云胃者水榖之海胃中榖熟則傳入少膓也小膓大二寸半徑八分分之少半長三丈二尺受穀二斗四升水六升合合之太半楊曰小膓受胃之穀而傳人於大膓分穀三分有二爲太半有一爲少半廽膓大四寸徑一寸半長二丈一尺受穀一斗木七升半楊曰廽膓者大膓也受小膓之榖而傳入於廣膓焉虞曰水穀自胃有三斗五升傳入小膓則榖剰四斗水少八升六合合之少半又傳入大膓水穀之數比之在胃各减一半至此則水分入膀胱榖傳入肛門也廣膓大八寸徑二寸半長二尺八寸受榖九升三合八分合之一楊曰廣膓者䐈膓也一名肛門受大膓之榖而傳出故膓胃凡長五丈八尺四寸合受水穀八斗七升六合八分合之一此膓胃長短受水榖之數也楊曰據甲乙經言膓胃凡長六丈四寸四分所以與此不同者甲乙經從口至䐈膓而數之故長此經從胃至膓而數之故短亦所以互相發明非有謬也肝重四斤四兩左三葉右四葉凡七葉虞曰肝足厥隂配足少陽少陽之次數於七故有七葉主藏魂虞曰魂者神氣之輔弼也楊曰肝者幹也於五行爲木故其於體狀有枝幹也肝神七人老子曰名明堂宮蘭臺府從宮三千六百人又云肝神六童子三女人又肝神名蓋藍心重十二兩中有七孔三毛盛精汁三合主藏神楊曰心䜟也言所以識䜟㣲無物不貫也又云心任也言能任物也其神九人太尉公名絳宮大始南極老人元先之身其從宮三于六百人又曰心爲帝王身之主也心神又名呴呴虞曰神者精氣之化成也脾重二斤三兩扁廣三寸長五寸有散膏半斤主褁血温五藏主藏意楊曰脾俾也在胃之下俾助胃氣主化水穀也其神五人玄光玉女子母其從宮三千六百人其脾神又名俾俾肺重三兩三兩六葉兩耳凡八葉虞曰肺者金之稽兌之氣位居於酉酉是八門八葉之應法於此也主藏魂楊曰肺勃也言其氣勃鬰也其神八人大和君名曰玉堂宮尚書府其從宮三千六百人又云肺神十四童子七女子肺神又名鳴鳩虞曰魄者精氣之匡輔也腎有兩枚重一斤一兩主藏志楊曰腎引也腎屬水主引水氣灌注諸脉也其神六人司徒司宮司命司隷校尉廷尉卿腎神又名僄僄虞曰專意不移者志膽在肝之短葉間重三兩三銖盛精汁三合楊曰膽敢也言其人有膽氣果敢也其神五人太一道君居紫房宫中其從宫三千六百人膽神又名灌灌虞膽者中正之官決斷出焉胃重二斤二兩紆曲屈伸長二尺六寸大一尺五寸徑五寸盛穀二斗水一斗五升楊曰胃圍也言圍受食物也其神十二人五元之氣諫議大夫其胃神名且且虞曰胃爲倉廪之官也小膓重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左廻疊積十六曲盛榖二斗四升水六升三合合之太半楊曰膓暢也言通暢胃氣去滓穢也其神二人元梁使者小膓神又名潔潔虞曰小膓爲受盛之官化物出焉大膓重二斤十二兩長二丈一尺廣四寸徑一寸當齊右廽十六曲盛穀一斗水七升半楊曰大膓卽廽膓也以其廽曲因以名之其神二人元梁使者其神名涸涸虞曰大膓爲傳導之官變化出焉膀胱重九兩二銖縱廣九寸盛溺九升九合楊曰膀横也胱廣也言其體短而横廣又名胞胞鞄也鞄者空也以需承水液焉今人多以兩脇下及小腹兩邊爲膀胱深爲謬也虞曰膀胱爲州都之官津液藏焉口廣二寸半唇至齒長九分齒以後至㑹厭深三寸半大容五合舌重十兩長七寸廣二寸半楊曰舌者泄也言可舒泄於言語也虞曰唇者聲之扇舌者聲之機咽門重十兩廣二寸半至胃長一尺六寸楊曰咽嚥也言可以嚥物也又謂之嗌言氣之流通阨要之處也咽爲胃之系也故經曰咽主地氣胃爲土故云主地氣也喉嚨重十二兩廣二寸長一尺二寸九節楊曰喉嚨空虛也言其中空虚可以通氣息焉卽肺之系也呼吸之道路故經云喉主天氣肺應天故云主天氣也喉嚨與咽並行其實無異而人多感之肛門重十二兩大八寸徑二寸大半長二尺八寸受榖九升三合八分合之一楊曰肛釭也言其處似車釭形故曰肛門卽廣膓也又名䐈膓丁曰前膓胃徑圍大小不同其言胃大一尺五寸徑五寸者卽是圍徑一也小膓徑八分大二寸四分則是也今言二寸半卽分之少半廻膓徑一寸半卽大四寸五分今言大四寸卽少五分也廣膓徑一寸半卽大七寸五分今言八寸卽有剰五分也其升斗寸尺者先立其尺然後造其升斗秤兩皆以同身寸之爲法以尺造斗斗面闊一尺底闊七寸高四寸俱厚三分可容十升凡以木此指節者方一寸爲兩十六兩爲斤此制同身寸尺升斗之度爲人之膓胃斤重長短之法也四十三難曰人不食飮七日而死者何也然人胃中常有留穀二斗水一斗五升故平人日再至圊一行二升半日中五升七日五七三斗五升而水穀盡矣故平人不食飲七日而死者水穀津液俱盡卽死矣丁曰人受氣於榖以養其神水穀盡卽神去故安榖者生絕榖者死也楊曰胃中常留水穀三斗五升人旣不食飲而日别再圊便一日五升七日之中五七三斗五升胃中水榖俱盡無氣以生故死焉圊厠也虞曰人受氣於穀今不食飮七日是知水榖氣盡卽死也四十四難曰七衝門何在然唇爲飛門齒爲戸門㑹厭爲吸門胃爲賁門太倉下口爲幽門太膓小膓㑹爲闌門下極爲魄門故曰七衝門也丁曰經言唇爲飛門者取動之義也齒爲戸門者爲關鍵開合五穀由此摧廢出入也㑹厭爲吸門者咽喉爲水穀下時厭按呼吸也胃爲賁門者胃言若虎賁之士圍達之象故曰賁門也况胃者圍也主倉廪故别名太倉其下口者卽膓口是也大膓小膓㑹爲闌門㑹者合也大膓小膓合㑹之處分闌水榖精血各有所歸故曰闌門也下極爲魄門大膓者肺之府也藏其魄大膓下名肛門又曰魄門也楊曰人有七竅是五藏之門戸皆出於面今七衝門者亦是藏府之所出而内外兼有證焉飛門者脾氣之所出也脾主於唇爲飛門也飛者動也言唇受水榖動轉入於内也齒爲戶門者口齒心氣之所出也在心爲志出口爲言故齒爲心之門戸亦取摧伏五榖傳入於口也㑹厭爲吸門者㑹厭爲五藏音聲之門戸故云㑹厭爲吸門也胃爲賁門賁者膈也胃氣之所出也胃出榖氣以傳於肺肺在膈上故以胃爲賁門也太倉下口爲幽門者腎氣之所出也太倉者胃也胃之下口在齊上三寸旣幽隱之處故曰幽門大膓小膓㑹爲闌門闌門者遺失之義也言大小二膓皆輸㵼於廣膓廣膓旣受傳而出之是遺失之意也故曰闌門下極爲魄門魄門者下極肛門也肺氣上通喉嚨下通於肛門是肺氣之所出也肺藏魄故曰魄門焉衝者通也出也言藏府之氣通出之所也四十五難曰經言八㑹者何也然府㑹大倉丁曰府㑹太倉者胃也其穴者中脘是也虞曰太倉在心前鳩尾下四寸是也足陽明胃脉手太陽少陽脉手少陽三焦脉任脉之㑹本名中脘此云太倉也卽胃之募也胃化氣養大府故云㑹藏㑹季脇丁曰藏㑹季脇軟筯之名其端有穴直臍章門穴是脾之募足厥隂少陰所㑹故曰藏㑹季脇也虞曰是章門穴乃脾之募也直齊季脇端側臥屈上足伸下足齊臂取之乃足厥陰少陽之㑹也筋㑹陽陵泉丁曰陽陵泉穴名也在膝下一寸外廉是也虞曰陽陵泉穴在膝下宛宛中足少陽膽脉氣所發也髄㑹絕骨丁曰隨㑹絕骨是骨名也其穴在外踝上四寸陽輔穴是也虞曰絕骨乃陽輔穴也亦足少陽之脉氣所出也血㑹鬲兪丁曰血㑹鬲兪穴名也在第七椎下兩傍同身寸各一寸五分是也虞曰鬲兪二穴在脊骨第七椎下兩傍各一寸五分足太陽膀胱脉氣所發也骨㑹大抒脉太淵丁曰骨㑹大抒穴名也在項後第一椎兩傍相去同身寸一寸五分脉㑹太淵穴在右寸内魚際下虞曰大杼亦足太陽脉氣所發在脊第一椎兩傍各一寸五分太淵在手魚際間應手動脉則手太隂之脉氣所發也氣㑹三焦外一筋直兩乳内也熱病在内者取其㑹之氣穴也丁曰氣㑹三焦外一筯直兩乳内者膻中穴是也此者是成㑹之穴所在也楊曰人藏府筋骨髓血脉氣此八者皆有㑹合之穴若熱病在於内則於外取其所㑹之穴以去其疾也季脇章門穴也三焦外一筋直兩乳内者膻中穴也餘皆可知也四十六難曰老人臥而不寐少壯寐而不窹者何也然經言少壯者血氣盛肌肉滑氣道通榮衛之行不失於常故晝日精夜不窹老人血氣衰氣肉不滑榮衛之道濇故晝日不能精夜不得寐也故知老人不得寐也丁曰天地交秦日月曉昏人之窹寐皆相合也少壯未損其榮衛故窹寐與天地隂陽同度是以晝日精强夜得其寐也老者損瘁故晝日不能精强榮衛滯濇所以夜不得寐也是以晝日不精而夜不得寐也楊曰衞氣者晝日行於陽陽者身體也夜行於隂隂者腹内也人目開衛氣出則窹入則寐少壯者衛氣行不失於常故晝得安靜而夜得穏眠也老者衛氣出入不得應時故晝不得安靜夜不得寐也精者靜靜安也四十七難曰人靣獨能耐寒者何也然人頭者諸陽之㑹也諸隂脉皆至頸胸中而還獨諸陽脉皆上至頭耳故令面耐寒也丁曰天地隂陽升降各有始終陽氣始於立春終於立冬隂氣始於立秋終於立夏其小滿芒種夏至小暑大暑此五節故以法象於頭故面獨能耐寒其小雪大雪冬至小寒大寒此五節法象人之足亦不耐其寒此之謂也楊曰按諸隂脉皆至頸胸中而還蓋取諸陽盡㑹於頭面諸隂至頭靣者少故以言之耳經云三百六十五脉悉㑹於目如此則隂陽之脉皆至於面不獨言陽脉自至於頭面也虛實邪正第七凡五首四十八難曰人有三虚三實何謂也然有脉之虛實有病之虛實有診之虛實也脉之虛實者濡者爲虚緊牢者爲實丁曰脉緩軟者濡按之而有力者牢實也楊曰按之如切繩之狀謂之緊也病之虛實者出者爲虛實入者爲實丁曰陰陽者主其内外也今陽不足隂出乘之在内俱隂故知出者爲虚也隂不足陽入乘之在外俱陽故知者入爲實也楊曰呼多吸少吸多呼少言者爲虛不言者爲實楊曰肺主聲入心爲言故知言者爲虚肝主謀慮故入心卽不言用爲實邪故知不言者爲實也楊曰藏氣虛精氣脫故多言語也藏氣實邪氣盛故不欲言語也緩者爲虚急者爲實丁曰陽主躁隂主靜陰卽緩陽卽急故知緩者爲虛急者爲實也楊曰皮肉寛緩皮膚滿急也診之虛實者濡者爲虛楊曰皮膚濡緩也牢者爲實楊曰皮肉牢强也癢者爲虛楊曰身體虛痒也痛者爲實楊曰身形有痛處皆爲實外痛内快爲外實内虛楊曰輕手按之則痛爲外實病淺故也重手按之則快爲内虛病深故也内痛外快爲内實外虛楊曰重手按之則痛爲内實病深故也輕手按之則快爲外虛病淺故也凡人病按之則痛者皆爲實按之則快者皆爲虛也故曰虛實也楊曰是三虛三實之證也丁曰診按之心腹皮膚内外其痛按之而止者虛按之而其痛甚者實内外同法也四十九難曰有正經自病有五邪所傷何以别之然經言憂愁思慮則傷心丁曰心主脉愁憂思慮卽心脉不得宣行故傷心也呂曰心爲神五藏之君聰明才智皆由心出憂勞之甚則傷其心心傷神弱也虞曰任治於物淸箏栖靈曰心今憂愁思慮不息故傷心也形寒飮冷則傷肺丁曰肺主皮毛惡其寒所以形寒飮寒則令傷其肺也呂曰肺主皮毛形寒者皮毛寒也飮冷者傷肺也肺主受水漿水漿不可冷飮肺又惡寒故曰傷也恚怒氣逆上而不下則傷肝丁曰肝主謀慮膽主勇斷故怒極卽傷其肝也呂曰肝與膽爲藏府其氣勇故主怒怒則傷也虞曰素問云怒則血菀積於上焦名曰逆厥又曰怒甚嘔血氣逆使然故傷也飮食勞倦則傷脾丁曰脾主味飲食味美而過食之無度勞動其力倦局其足故傷脾也呂曰飲食飽胃氣滿脾絡恒急或走馬跳躍或以房勞脉絡裂故傷脾也虞曰脾爲倉廪之官五味出焉謂納其五味化生五氣以飬人身今飮食勞倦而致自傷是故聖人謹和五味骨正筋柔謹道如法長有天命安致自傷養生之道可不戒哉久坐濕地强力入水則傷腎丁曰腎主腰腰者腎之府久坐則腎氣不得宣行故損也腎穴在足心底名曰涌泉居處濕地入水故有損也强力者務快其心强合隂陽故傷其腎也呂曰久坐濕地謂遭憂䘮强力者謂舉重引弩入水者謂復溺於水或婦人經水未過强合隂陽也虞曰土主濕自然之理也今久坐濕地則外濕内感於腎合之風寒發爲瘴病强力過用必致自飮也經脉别論曰持重遠行必傷於腎生氣通天論曰因而强力腎氣乃傷高骨乃壞經脉别論曰度水跌仆喘出於腎與胃也是正經之自病也丁曰此五者皆正經自病非謂他邪也呂曰此皆從其藏内自發病不從外來也虞曰呂氏言其藏内自發其病不從外來其義非也只如形寒飮冷傷肺者謂外寒感於皮毛内合於肺此從外來也又飮冷入口内傷於肺亦從外來也餘悉如此聖人大意言正經虛則腠理開腠理開則外感於内故曰正經自病也何謂五邪然有中風丁曰中者傷也言中風者謂肝應風主色邪散於五藏爲之五色也呂曰肝主風也虞曰東方生風風生木惡風又巽木爲風有傷暑丁曰傷暑者謂心應暑主臭邪散於五藏爲之五臭也呂曰心主暑也虞曰心火主暑王於夏暑熱也素問曰夏傷於暑秋必痎瘧有飮食勞倦丁曰脾應濕主味邪散入五藏篇五味呂曰脾主勞倦也虞曰正經自病亦言飮食勞倦傷脾今五邪亦言飮食勞倦正經病謂正經虛又傷飮食五邪病謂食飮傷於脾而致病也有傷寒丁曰肺主燥而其令淸功惡寒主其聲邪散入五藏爲之五聲也呂曰肺主寒也虞曰謂寒感皮毛故曰傷寒也有中濕丁曰腎應寒主水邪散入五藏爲之五液也呂曰腎主濕也虞曰水流濕之義也此之謂五邪呂曰此五病從外來也虞曰此五行相勝也作邪如下說也假令心病何以知中風得之然其色當赤何以言之肝主色虞曰巽爲風屬木故主中風木之華蕚敷布五色作五邪乃如下說也自入爲靑虞曰本經自病也入心爲赤虞曰肝邪入心其色乃赤入脾爲黃虞曰肝邪入脾其色黃也入肺爲白虞曰肝邪入肺故其色白入腎爲黑虞曰肝邪在腎其色黑肝爲心邪故知當赤色也呂曰肝主中風心主傷暑者今心病中風故知肝邪徃傷心也其病身熱脇下滿痛呂曰身熱者心滿痛者肝二藏之病證也虞曰心主傷暑病則身熱肝布兩脇故脇滿肝之乘心也其脉浮大而絃呂曰浮大者心弦者肝二藏脉見應也何以知傷暑得之然當惡臭何以言之心主臭虞曰心火也火之化物五臭出焉自入爲焦臭虞曰火性炎上則生焦臭此曰正經自病也入脾爲香臭虞曰火之化土其臭乃香入肝爲臊臭虞曰火之化木其臭乃臊入腎爲腐臭虞曰火之化水其臭乃腐入肺爲腥臭虞曰火之化金其臭乃腥故知心病傷暑得之也當惡臭其病身熱而煩心痛其脉浮大而散呂曰心主暑今傷暑此正經自病不中他邪何以知飮食勞倦得之然當喜苦味也虛爲不欲食實爲欲食何以言之脾主味虞曰稼穡作甘禮云甘受和故主味也入肝爲酸虞曰脾主味爲邪乗肝病者乃喜酸味也入心爲苦虞曰脾主味爲邪干心病者乃喜苦味也入肺爲辛虞曰脾主味爲邪干肺病者乃喜辛味也入腎爲鹹虞曰脾主味爲邪干腎病者乃喜鹹味也自入爲甘虞曰土爲稼穡本經自病乃喜甘味也故知脾邪入心爲喜苦味也呂曰心主傷熱脾主勞倦今心病以飮食勞倦得之故知脾邪入心也其病身熱而體重嗜臥四肢不收呂曰身熱者心也體重者脾也此二藏病證也其脉浮大而緩呂曰浮大者心脉緩者脾脉也何以知傷寒得之然當譫言妄語何以言之肺主聲虞曰五金擊之有聲故五音出於肺也入肝爲呼虞曰木之畏金故呼啓玄子云呼亦當嘯入心爲言虞曰此云言素問云笑謂金火相當夫婦相見故言笑入脾爲歌虞曰土母金子母子相見故有歌義入腎爲呻虞曰金母水子子之見母發嬌呻聲也自入爲哭虞曰肺主於秋秋者愁也其音商商傷也故自入爲哭也故知肺邪入心爲譫言妄語也呂曰心主暑肺主寒得之故知肺邪入心以爲病也其病身熱洒洒惡寒甚則喘咳呂曰身熱者心惡寒者肺此二藏病證也其脉浮大而濇呂曰浮大者心脉濇者肺脉也何以知中濕得之然當喜汗出不可止何以言之腎主濕丁曰腎主水水化五液也虞曰腎主水水流濕故五濕皆出於腎入肝爲泣虞曰悲哀動中則傷魂魂傷則感而淚下謂肺主悲悲則金有餘木乃畏之水者木之母母憂子故肝爲泣也入心爲汗虞曰水火交秦蒸之爲汗入脾爲液虞曰土夫水妻妻從夫則生涎也入肺爲涕虞曰北方生寒寒生腎今寒感皮毛内合於肺肺寒則涕是知入肺爲涕自入爲唾虞曰腎之脉上絡於舌故生唾也離中六二爻是也此則正經自病故知腎邪入心爲汗出不可止也呂曰心主暑腎主濕今心病以傷濕得之故知腎邪入心也其病身熱而小腹痛足脛寒而逆呂曰身熱者心小腹痛者腎腎邪于心此二藏病證也其脉沉濡而大呂曰大者心脉沉濡者腎脉也此五邪之法也五十難曰病有虛邪有實邪有賊邪有㣲邪有正邪何以别之然從後來者爲虛邪丁曰假令心病得肝脉來乘是爲虛邪肝是母心是子子能令母虛故云從後來者爲虛邪呂曰心王之時脉當洪大而長反得弦小而急是肝王畢木傳於心奪心之王是肝徃乘心故言從後來也肝爲心之母母之乘子是爲虛邪也從前來者爲實邪丁曰脾脉來乘是爲實邪心是母脾是子而母能令子實故云從前來者爲實邪也呂曰謂心王得脾脉心王畢當傳脾今心王未畢是脾來逆奪其王故言從前來也脾者心之子子之乘母是爲實邪從所不勝來者爲賊邪丁曰火所不勝於水心病腎脉來乘故爲賊邪呂曰心王得腎脉水勝火故是爲賊邪也從所勝來者爲㣲邪丁曰火所勝於金心病肺脉來乘故云㣲邪呂曰心王反得肺脉火勝金故爲㣲邪也自病者爲正邪丁曰無他邪相乘則爲正邪呂曰心王之時脉實强太過反得虛㣲爲正邪也何以言之假令心病中風得之爲虛邪傷暑得之爲正邪呂曰心主暑今心自病傷暑故爲正邪也飮食勞倦得之爲實邪呂曰從前來者脾乘心也脾主勞倦故爲實邪傷寒得之爲㣲邪呂曰從所勝來者肺乘心也肺主寒又畏心故爲㣲邪中濕得之爲賊邪呂曰從所不勝來者腎乘心也腎主濕水尅火故爲賊邪也丁曰夫在天之寒在地爲水在人爲腎腎主水與寒在天之風在地爲木在人爲肝肝主風在天之暄暑在地爲火在人爲心心主暑在天之燥在地爲金在人爲肺肺主燥在天之濕在地爲土在人爲脾脾主濕此是天地人三才相通也今經以寒合肺以濕合腎以飮食勞倦合脾此三者義理稍差未詳其㫖五十一難曰病有欲得温者有欲得寒者有欲得見人者有不欲得見人者而各不同病在何藏府也然病欲得寒而欲見人者病在府也病欲得温而不欲得見人者病在藏也何以言之府者陽也陽病欲得寒又欲見人藏者隂也隂病欲得温又欲閉戸獨處惡聞人聲故以别知藏府之病也丁曰手三隂三陽應天主暄暑燥病卽欲得寒也然陽者明也是以欲得見人陽爲府故言病在府也足三隂三陽應地主風寒濕故病卽欲得温隂主藏故不欲見人也諸浮躁者病在手諸静不躁者病在足五十二難曰府藏發病根本等不然不等也其不等奈何然藏病者止而不移其病不離其處丁曰藏病爲隂隂主静故止而不移呂曰藏者陰决於地故不移動也府病者彷彿賁嚮上下行流居處無常丁曰府病爲陽主動故上下行流居處無常呂曰府陽也陽者法天天有廽旋不休故病流轉居無常處也故以此知藏府根本不同也藏府傳病第八凡二首五十三難曰經言七傳者死間藏者生何謂也然七傳者傳其所勝也間藏者傳其子也何以言之假令心病傳肺肺傳肝肝傳脾脾傳腎腎傳心一藏不再傷故言七傳者死也間藏者傳其所生也丁曰經云前七傳者死後言間藏者生其言七傳者是五藏爲隂傳其所勝間藏者是六府爲陽故傳其所生亦五藏六府並應五行傳其所生者生傳其所勝者死其言傳肺肺死而不傳故一藏不再傷也呂曰七當爲次字之誤也此下有間字卽知上當爲次又有五藏心獨再傷爲有六傳耳此蓋次傳其所勝藏故其病死也虞曰七傳者死七字明也呂氏以七爲次深爲誤矣又聲音不相近也今明之以示後學謂五行相生而數之數終於五又却再數至二成七向上之五來傳於七七之被尅故云死也今舉一例以發明之假令相生之數數木火土金水水火第五水字隔第六木字來尅第七火字火被水尅故曰七傳下文云間藏者是第五水字下傳與第六木字見相生故曰間藏者生也呂氏言次者次正成間藏也假令心病傳脾脾傳肺肺傳腎腎傳肝肝傳心是母子相傳竟而復始如環之無端故言生也丁曰其言心傳脾脾得生氣再傳於肺是母子相傳故言生也呂曰間藏者間其所勝藏而相傳也心勝肺脾間之肝勝脾心間之脾勝腎肺間之肺勝肝腎間之腎勝心肝間之此謂傳其所生也五十四難曰藏病難治府病易治何謂也然藏病所以難治者傳其所勝也府病易治者傳其子也與七傳間藏同法也丁曰藏者隂也病難治者謂言傳其勝也勝者謂肝勝脾脾勝腎腎勝心心勝肺肺勝肝故難治也府者陽也言陽病傳其子者卽是木病傳火火病傳土土病傳金金病傳水水木逓相生卽府病昜治也是故與七傳閒藏法同也楊曰與前章略同也藏府積聚第九凡二首五十五難曰病有積有聚何以别之然積者隂氣也聚者陽氣也故隂沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五藏所生聚者六府所成也積者陰氣也其始發有常處其痛不離其部上下有所終始左右有所窮處聚者陽氣也其始發無根本上下無所留止其痛無常處謂之聚故以是别知積聚也丁曰積者隂氣所積是五藏傳其所勝當王時不受邪故留結爲積所以止而不移也聚者六府之爲病陽也所傳其子以廻轉不定又陽主動故無常處呂曰諸陰証病常在一處牢强有頭足止不移者藏氣所作死不治故言藏病難治所以證病上下左右無常處者此所謂陽證雖困可治本不死也故當經歲月故經言府病易治五十六難曰五藏之積各有名乎以何月何日得之然肝之積名曰肥氣在左脇下如覆杯有頭足久不愈令人發咳逆㾬瘧連歲不巳以季夏戊巳日得之何以言之肺病傳於肝肝當傳脾脾季夏適王王者不受邪肝復欲還肺肺不肯受故留結爲積故知肥氣以季夏戊巳日得之楊曰積蓋也言血脉不行積蓋成病也凡積者五藏所生也榮氣常行不失節度謂之平人平人者不病也一藏受病則榮氣壅塞故病焉然五藏受病者則傳其所勝所勝適王則不肯受傳旣不肯受則反傳所勝所勝復不爲納於是則留結成積漸以長大病因成矣肥氣者肥盛也言肥氣聚於左脇之下如覆杯突出如肉肥盛之狀也小兒多有此病按前章有積有聚此章唯出五積之名狀不言諸聚聚者六府之病亦相傳行還如五藏以勝相加故不重言從省約也心之積名曰伏梁起齊上大如臂上至心下久不愈令人病煩心以秋庚辛日得之何以言之腎病傳心心當傳肺肺以秋適王王者不受邪心復欲還腎腎不肯受故留結爲積故知伏梁以秋庚辛日得之楊曰伏梁者言積自齊上至心下其大如臂狀似屋舍棟梁也脾之積名曰痞氣在胃脘覆大如盤久不愈令人四肢不収發黃疽飮食不爲肌膚以冬壬癸日得之何以言之肝病傳脾脾當傳腎腎以冬適王王者不受邪脾復欲還肝肝不肯受故留結爲積故知痞氣以冬壬癸日得之楊曰痞否也言否結成積也脾氣虛則胃中熱而引食焉脾病不能通氣行津液故雖食多而羸瘦也肺之積名曰息賁在右脇下覆大如杯久不巳令人洒浙寒熱喘咳發肺壅以春甲乙日得之何以言之心病傳肺肺當傳肝肝以春適王王者不受邪肺復欲還心心不肯受故留結爲積故知息賁以春甲乙日得之楊曰息長也賁鬲也言肺在膈上其氣不行漸長而逼於膈故曰息賁一曰賁聚也言其漸長而聚蓄肺爲上蓋藏中陽也陽氣盛故令人發肺壅也腎之積名曰賁豚發於少腹上至心下若豚狀或上或下無時久不巳令人喘逆骨痿少氣以夏丙丁日得之何以言之脾病傳腎腎當傳心心以夏適王王者不受邪腎復欲還脾脾不肯受故留結爲積故知賁豚以夏丙丁日得之此是五積之要法也丁曰人之五藏本和謂恣慾五情所以有增損故藴積生其病也故有積有聚積病爲隂聚病爲陽王時卽安失時卽病也舊經文注皆明矣楊曰此病狀似豚而土衝心又有奔豚之氣非此積病也名同而疾異焉五泄傷寒第十凡四首五十七難曰泄凡有幾皆有名不然泄凡有五其名不同有胃泄有脾泄有大膓泄有小膓泄有大瘕泄名曰後重胃泄者飲食不化色黃楊曰泄利也胃屬土故其利色黃而飮食不化焉化變也消也言所食之物皆完出不消變也虞曰此乃風入於膓上重於胃故使食不消化風論曰久風入中則爲膓風飱泄飱泄爲食不消化也脾泄者腹脹滿泄注食卽嘔吐逆楊曰注者無節度也言利下猶如注水不可禁止焉脾病不能化榖故食卽吐逆虞曰中央生濕濕生土土生脾脾惡濕濕氣之勝故腹脹而泄注土性主信又主味今土病於味無信故食則吐逆隂陽應象論曰濕勝則濡㵼謂濕氣内攻脾胃則水榖不分故泄注大膓泄者食巳窘迫大便色白膓鳴切痛楊曰窘迫急也食訖卽欲利迫急不可止也白者從肺色焉膓嗚切痛者冷也切者言痛如刀切其膓之狀也虞曰大膓氣虛所以食畢而急思厠虛則邪傳於内眞邪相擊故切痛也小膓泄者溲而便膿血少膓痛楊曰小膓屬心心主血脉故便膿血少膓處在少膓故小腹痛也大瘕泄者裏急後重數至圊而不能便莖中痛此五泄之法也楊曰瘕結也少腹有結而又下利者是也一名利重後言大便處疼重也數欲利至所卽不利又痛引隂莖中此是腎泄也按諸方家利有二十餘種而此惟見五種者蓋舉其宗維耳虞曰腎開竅於二隂氣虚故數思圊後重而不能便莖中痛腎氣不足傷於衝脉故裏急也靈樞病總曰凡五泄者春傷於風寒邪留連乃爲洞泄此之謂也丁曰裏急者膓中痛後重者腰以上沉重也餘皆舊經有注五十八難曰傷寒有㡬其脉有變不然傷寒有五有中風有傷寒有濕溫有熱病有温病其所苦各不同中風之脉陽浮而滑隂濡而弱丁曰肌肉之上陽脉所行輕手按之狀若大過謂之滑肌肉之下隂脉所行重手按之不足謂之弱此者是按之不足舉之有餘故知中風也楊曰自霜降至春分傷於風冷卽病者謂之傷寒其冬時受得寒氣至春又中春風而病者謂之冷温病其至夏發者多熱病病而多汗者謂之濕溫其傷於八節之虚邪者謂之中風㨿此經言温病則是疫癘之病非爲春病也疫癘者謂一年之中或一州一懸若大若小俱病者是也按之乃覺徃來如有舉之如無者謂之弱也關以前浮滑尺中濡弱者也濕温之脉陽濡而弱隂小而急丁曰陽濡而弱者肌肉之上陽脉所行濡弱者是濕氣所勝火也肌肉之下隂脉所行小急者是土濕之不勝木故見小急所以言陽濡而弱隂小而急也楊曰小細也急疾也虞曰濕温之病謂病人頭多汗出何以言之寸口謂陽脉見濡弱此水之乘火也本經曰腎主液入心成汗此之謂也傷寒之脉隂陽俱盛而緊濇丁曰隂陽俱盛者極也謂寸尺脉俱盛極而緊濇此者中霧露之寒也水得風寒而凝結故知腎得寒而有此脉見也虞曰如切繩狀曰緊如刀剖竹曰濇熱病之脉隂陽俱浮浮之滑沉之散濇丁曰隂陽俱浮者謂尺寸俱浮也浮之而滑者輕手按之而滑是心傷熱脉也沉之而散濇者沉手而按之而散濇是津液虛少也楊曰輕手按者名浮重手按者名沉也温病之脉行在諸經不知何經之動也各隨其經所在而取之丁曰肺者金主氣散行諸經不知何經虛而傳受此邪故隨其所在取其病邪也楊曰兼鬼癘之氣散行諸經故不可不預知臨病人而診之知其何經之動卽爲治也膓寒有汗出而愈下之而死者有汗出而死下之而愈者何也然陽虛隂盛汗出而愈下之卽死陽盛陰虛汗出而死下之而愈丁曰其陰陽盛虛者謂非言脉之浮沉也謂寒暑病異燥濕不同人之五藏六府有十二經皆受於病其手太陽少隂屬火主暄手陽明太隂屬金主燥手少陽厥陰屬相火主暑此是燥暑暄六經以通天氣病卽不躰重惡風而有躁素問曰諸浮躁者病在手是也若以承氣下之卽愈服桂枝取汗汗出卽死其足大陽少陰屬水主寒足陽明太隂屬土主濕足厥隂少陽屬木主風此是風寒濕六經以通地氣病卽體重惡寒故素問曰諸浮不躁者病左足是也若以桂枝取汗汗出卽愈服承氣下之卽死此是五藏六府配合隂陽大法也所以經云陽虛隂盛汗出而愈下之而死其陽盛隂虚汗出而死下之而愈此義非反顚倒也楊曰此說反倒於義不通不可依用也苦反此行之乃爲順爾虞曰諸經義皆不錯此經例義必應傳寫誤也凡傷寒之病脉浮大而數可汗之則愈病有表也脉沉細而數可下之則愈病在裏也推此行之萬無一失寒熱之病候之如何也然皮寒熱者皮不可近席毛髪焦鼻槀不得汗丁曰肺候身之皮毛大膓爲表裏藏病卽寒府病卽熱故言皮寒熱也皮不可近席者謂手三隂三陽法天天動故病卽不欲臥近席也毛髪焦鼻槀不得汗者謂下有心火燥熱之爲病不得汗之汗之卽死下之卽愈謂肺主燥故也肌寒熱者皮膚痛唇舌槀無汗丁曰脾候身之肌肉胃爲表裏藏病卽體寒府病卽體熱故言肌寒熱也皮膚痛唇舌槀脾者應土土主濕故皮膚津液出體重其津液外泄卽唇舌槀病名濕燥無以汗之汗之卽膓胃㵼不通下之卽泄注此者是濕氣之爲病當温中調氣也骨寒熱者病無所安汗注不休齒本槀痛丁曰腎主骨與膀胱爲表裏病在陽卽身熱體重惡寒在隂卽寒病無所安腎主水汗注不休齒本槀痛汗卽愈下卽死隂盛陽虛故死楊曰五藏六府皆有寒熱此經惟出三狀餘皆闕也五十九難曰狂癲之病何以别之然狂之始發少臥而不饑自高賢也自辨智也自貴倨也妄笑好歌樂妄行不休是也丁曰狂病者病在手三陽而反汗故陽盛卽發狂也病在足三隂而反下故隂盛卽發癲也楊曰狂病之候觀其人初發之時不欲眠臥又不肯飮食自言賢智尊貴歌笑行走不休皆陽氣盛所爲故經言重陽者狂此之謂也今人以爲癲疾謬矣癲疾始發意不樂直視僵仆其脉三部隂陽俱盛是也丁曰經言重陽者狂重隂者癲今三部隂陽俱盛者寸爲陽尺爲隂寸尺俱盛極而沈也楊曰癲顚也發則僵仆焉故有顚蹶之言也隂氣太盛故不得行立而側仆也今人以爲癎病誤矣六十難曰頭心之病有厥痛有眞痛何謂也然手三陽之脉受風寒伏留而不去者則名厥頭痛入連在腦者名眞頭痛丁曰手三陽者陽中之陽今受風寒伏留不去卽是三陽逆於上故名曰厥頭痛入連在腦者名曰眞頭痛腦者髓海風寒入卽死矣楊曰去者行也厥者逆也言手三陽之脉伏留而不行則壅逆而衝於頭故名厥頭痛也足三陽留壅亦作頭痛今經不言之從省久故也虞曰風冷之氣入於三陽之經故頭厥痛也其痛立巳眞頭痛者謂風冷之氣入於泥丸宮則爲髓海邪入則曰眞頭痛也頭腦中痛甚而手足冷至肘膝者名眞頭痛其寒氣入深故也風寒之氣循風府入於腦故云入連腦也其五藏氣相干名厥心痛楊曰諸經絡皆屬於心若一經有病其脉逆行逆則乘心乘心則心痛故曰厥心痛是五藏氣衝逆致痛非心家自痛也其痛甚伹在心手足靑者卽名眞心痛其眞心痛者旦發夕死夕發旦死丁曰眞心不病外經受五邪相干名曰厥心痛其痛甚則手足靑而冷神門穴絕者死病名眞心痛也楊曰心者五藏六府之王法不受病病卽神去氣竭故手足爲之清冷也心痛手足冷者爲眞心痛手足温者爲厥心痛也頭痛亦然從今日平旦至明日平旦爲一日今云旦發夕死夕發旦死是正得半日而死也神聖工巧第十一凡一首六十一難曰經言望而知之謂之神聞而知之謂之聖問而知之謂之工切脉而知之謂之巧何謂也然望而知之者望見其五色以知其病楊曰望色者假令肝部見靑色者肝自病見赤色者心乘肝肝亦病故見五色知五病也聞而知之者聞其五音以别其病楊曰五音者謂宮商角徵羽也以配五藏假令病人好哭者肺病也好歌者脾病也故云聞其音知其病也問而知之者聞其所欲五味以知其病所起所在也楊曰問病人云好辛味者則知肺病也好食冷者則知内熱故云知所起所在切脉而知之者診其寸口視其虛實以知其病病在何藏府也丁曰視當作持字爲以手循持其寸口也楊曰切按也謂按寸口之脉若弦多者肝病也洪多者心病也浮數則病在府沉細則病在藏故云在何藏也經言以外知之曰聖以内知之曰神此之謂也丁曰夫脉合五色色合五味味合五音故有此望聞問切之法經内前篇具說習之者能知此乃是神聖工巧之良醫也楊曰視色聽聲切脉皆在外而知内之病也藏府井兪第十二凡七首六十二難曰藏井榮有五府獨有六者何謂也然府者陽也三焦行於諸陽故置一兪名曰原府有六者亦與三焦共一氣也丁曰三焦者臣使之官位應相火宣行君火命令使行於諸陽經中故置一兪名曰原所以府有六亦是三焦之一氣故三焦共一氣也楊曰五藏之脉皆以所出爲井所流爲榮所注爲兪所行爲經所入爲合是謂五兪以應金木水火土也六府亦並以所出爲井所流爲榮所注爲兪所過爲原所行爲經所入爲合其兪亦應五行惟原獨不應五行原者元也元氣者三焦之氣也其氣尊大故不應五行所以六府有六兪亦以應六合於乾道也然五藏亦有原則以第三穴爲原所以不别立穴者五藏法地地卑故三焦之氣經過而巳所以無别穴六府旣是陽三焦亦是陽故云共一氣也虞曰天以六氣司下地以五行奉上六氣者風寒暑燥濕火也五行者金木水火土也十一之氣相因而成人應之乃六府法六氣五藏法五行亦十一之氣相因而成也天得六謂天屬陽以隂數配之地得五謂地屬隂以陽數配之而成隂陽也人府藏亦然六府配六氣者謂膽木配風膀胱水配寒小膓火配暑大膓金配燥胃土配濕三焦少陽配火三焦爲原氣在六府陽脉中自立一爲原也五藏配五行者肝木心火脾土肺金腎水五藏法隂無原一穴者謂五行隂脉穴中原氣暗主之故原井兪同一穴也故曰三焦共一氣其理明矣詳此經義前後問荅文理有闕六十三難曰十變言五藏六府榮合皆以井爲始者何也然井者東方春也虞曰經言井者東方春也春者施化育無求其報春者仁也在五常仁乃法水水之有仁者井水也井水濟人亦無求報故經云井者東方春也易曰井養而不窮可象春仁也萬物之始生虞曰萬物始生由春氣之化育也諸蚑行喘息蜎飛蠕動當生之物莫不以春而生虞曰井有仁焉故聖人渉春育物以象於井也夫葭灰方飛蟄虫始振所以蚑虫行喘息蜎虫飛蠕虫動皆因春氣而生故也蜎乃井中虫故歲數始於春虞曰春木也下文甲亦木井有仁仁亦木也今以井爲始者謂仁道至大在歲春爲首在日甲爲首在經脉井爲首故也日數始於甲故以井爲始也楊曰凡藏府皆以井爲始井者謂谷井爾非謂掘作之井山谷之中泉水初出之處名之曰井井者主出之義也泉水旣生留停於近榮迂未成大流故名之曰榮榮者小水之狀也留停旣深便有注射輪文之處故名之曰兪兪者委積逐流行經歷而成渠徑徑者經也亦經營之義也經行旣達合㑹於海故名之曰合合者㑹也此是水行流轉之義人之經脉亦法於此故取名焉所以井爲始春者以其所生之義也歲數始於春者正月爲歲首故也日數始於甲者謂東方甲乙也正月與甲乙皆屬於春也丁曰十二經氣穴三百六十五穴皆以井爲始各有其終矣王翰林集註黃帝八十一難經卷之四
