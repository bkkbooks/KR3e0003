front:
  text: 王翰林集注黃帝八十一難經卷之一
  hash: sha256:46ba5be08844144b025db885141adcc6e2ff82e5548e847f8d55368cf3ef00df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0003_SBCK_001-1a}
body:
  text: 盧國秦越人撰呂廣丁德用楊玄操虞庶楊康侯注解王九思王鼎象石友諒王惟一校正附音釋經脈診候第一凡二十四首一難曰十二經皆有動脈呂曰是手足經十二脈也丁曰十二經皆有動脈者是人兩手足各有三隂三陽之經也以應天地各有三隂三陽之氣也所謂天地三隂三陽各有所主其時自春分節後到夏至之前九十日為天之三陽所主也夏至之後秋分之前九十日天之三隂所主也秋分節後冬至之前九十日是地之三隂所主也冬至之後春分節前九十日地之三陽所主也凡左右上下各有此三隂三陽之氣合為十二故人亦有十二經也所主左右上下之分也又人膈以上者手三陰三陽所主也即通於天氣膈以下足三陰三陽所主也即通於地氣其通天氣者為氣為脈其通地氣者主味歸形故十二經通陰陽行氣血也又經者徑也遞相溉灌無所不通所以黃帝云十二經處百病次決死生不可不通也其言十二經皆有動脈者即在兩手三部各有會動之脈也即左手寸部心與小腸動脈所出也心脈曰手少隂心包絡脈曰手心主小腸脈曰手大陽其應東南方君火在巽是也左手關部肝膽動脈所出也肝脈曰足厥隂膽脈曰足少陽其應東方木在震是也左手尺部腎與膀胱動脈所出也腎脈曰足少隂膀胱脈曰足太陽其應北方水在坎是也右手寸部肺與大腸動脈所出也肺脈曰手太隂大腸脈曰手陽明其應西方金在兌是也右手關部脾胃動脈所出也脾脈曰足太隂胃脈曰足陽明其應中央土在坤是也右手尺部心包絡與三焦動脈所出也心包絡曰手厥隂三焦脈曰手少陽其應南方相火在離是也此三部動脈所出故經言皆有動脈也楊曰凡人兩手足各有三隂脈三陽脈合十二經脈肝脈曰足厥隂脾脈曰足太隂腎脈曰足少隂膽脈曰足少陽胃脈曰足陽明膀胱脈曰足太陽肺脈曰手太隂心脈曰手少陰心包絡脈曰手心主太腸脈曰手陽明小腸脈曰手太陽包絡脈曰手厥隂三焦脈曰手少陽凡脈皆雙行故有六陰六陽也呂曰足太陽動委中足少陽動耳前楊曰下關穴也又動縣鐘呂曰足陽明動趺上楊曰衝陽穴也在足趺上故以為名又動頸人迎又動大迎呂曰手太陽動目外眥楊曰瞳子窖穴也呂曰手少陽動客主人楊曰又動聽會呂曰手陽明動口邊楊曰地倉穴也呂曰又動陽溪足厥隂動人迎楊曰按人迎乃足陽明脈非足厥陰也呂曰厥陰動人迎誤矣人迎通候五藏之氣非獨因厥隂而動也按厥隂脈動於回骨焉呂曰足少隂動內踝下楊曰太溪穴也按此動脈非少隂脈也斯乃衝脈動耳衝脈與少隂並行因謂少隂脈動其實非也亦呂氏之謬焉少隂乃動內踝上五寸間也經曰彈之以候死生是也呂曰足太隂動髀上楊曰箕門穴也呂曰手少陰動掖下楊曰極泉穴也又動靈道少海呂曰手心主動勞宮手太隂脈動大淵楊曰又動尺澤俠白天府也虞曰呂楊二注惟各取其經脈流行之穴言其動脈與本經下文獨取寸口之義不相乘也庶今舉之經曰脈會大淵大淵在兩手掌後魚際間乃手太隂脈之動也大隂主氣是知十二經脈會於太淵故聖人準此脈要會之所於人兩手掌後魚際間分别三部名寸尺關於三部中診其動脈乃知人五藏六府虛實冷熱之證謂一經之中有一表一裏來者為陽去者為隂兩手合六部六部合之為十二經其理明矣察陽者知病之所在察隂者知死生之期故曰十二經皆有動脈也乃合診法獨取寸口以決五藏六府死生吉凶之法何謂也丁曰夫獨取寸口診法者其一指指下各有上下尤右長短浮沈滑澀遲數見病吉凶也此法是黃帝脈要精微論中之旨也越人引此一篇以為衆篇之首也昔黃常問曰診法何如岐伯對曰常以平且隂氣未動陽氣未散飮食未進經脈未盛絡脈調勻氣血未亂乃可診有過之脈切脈動靜視精明察五色視五藏有餘不足形之盛衰參伍決死生之分也此者是獨取寸口之法也楊曰自難曰至此是越人引經設問從然字以下是解釋其義餘悉如此例可知也然寸口者脈之大會手太隂之脈動也呂曰太隂者肺之脈也肺為諸藏上蓋主通陰陽故十二經皆會手太陰寸口所以決吉凶者十二經有病皆見寸口知其何經之動浮沈滑澀春秋逆順知其死生也丁曰其手太隂者是右手寸部也為肺主其氣為五藏六府之華蓋凡六藏六府有病皆見於氣口故曰大會也虞曰五味入胃化生五氣五味者甘辛鹹苦酸五氣者膻腥香焦腐乃五行之氣味也其味化氣上傳手太隂太隂主氣得五氣以溉灌五藏若胃失中和則不化氣手太隂無所受故寸口以浮沈長短滑澀乃知病發於何藏故經云寸口者脈之大要會也五藏别論曰五味入口以藏於胃以養五藏氣本經曰人受氣於穀玉機真藏論曰因胃氣乃能至手太隂隂陽應象論曰味歸形形歸氣氣歸精精歸化夫如是則知人之氣自味而化上傳手太隂故寸口為要會也人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸呂曰十二經十五絡二十七氣皆候於寸口隨呼吸上下呼脈上行三寸吸脈下行三寸呼吸定息脈行六寸二十七氣皆隨上下行以窹行於身寐行於藏晝夜流行無有休息時丁曰言人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸者即是天地隂陽升降定息也即是周於六甲而又日月曉昏人呼吸上下以六氣周身故乃法定息六寸也人一日一夜凡一萬三千五百息脈行五十度周於身漏水下百刻榮衛行陽二十五度行隂亦二十五度為一周也故五十度復會於手太隂寸口者五藏六府之所終始故法取於寸口也呂曰人一息脈行六寸十息脈行六尺百息脈行六丈千息六十丈萬息六百丈一萬三千五百息合為八百一十丈為一周陽脈出行二十五度隂脈入行二十五度合為五十度隂陽呼吸覆溢行周畢度數也脈行周身畢即漏水百刻亦畢也謂一日一夜漏刻盡天明日出東方脈還寸口當復更始也故曰寸口者五藏六府之所終始也丁曰按舊經注其脈息以為八百一十丈即當水下二刻得周身一度如百刻計周身五十度如此則行陽五十度行隂亦五十度此乃甚與經意不同也經言行陽二十五度行隂亦二十五度共得五十度而復會也所謂行陽行隂各二十五度者謂一歲隂陽始於立春交相復會於立春故共行五十度也日之曉昏人之窹寐皆在於平且日行二十四時復會於是人氣始自中焦注手太隂行其經絡計二寸四亦復交會於手太隂其右寸內有穴太淵是脈之大會始終故各計二十五所以言寸口者脈之終始也虞曰二百七十息脈行一十六丈二尺及一周身應漏水下二刻一萬三千五息脈行八百一十丈應漏水下百刻是知一日一夜行五十周於身凡行隂陽分晝夜是故行百陽二十五度行隂二十五度也漏水下百刻圖一歲隂陽升降會於立春一日隂陽曉昏會於艮時一身滎衛還周會於手太隂同天度一萬三千五百息榮衛始於從中焦注手太隂陽明陽明注足陽明太隂太隂注手少隂太陽太陽注足太陽少隂少隂注手心主少陽少陽注足少陽厥陰厥隂復還注手太隂天度二十四氣晝夜二十四時人身經二十四條人身經二十四條流注與天同度所以計一萬三千五百息二難曰脈有尺寸何謂也然尺寸者脈之大要會也呂曰諸十二經脈三部九候有病者皆見於尺寸故言脈之大要會也丁曰舊經注此説為五藏六府之法者非也大要會者謂尺寸隂陽往復各有要會也從關至尺是尺內隂之所治也從關至魚際是寸內陽之所治也呂曰至尺者言從尺至關其脈見一寸而言尺者是其根本寸口長一寸而脈見九分陽數奇陰數隅也故分寸為尺分尺為寸丁曰分寸為尺者人從關至尺澤穴當一尺也於其尺內分一寸以代一尺之法是故分寸為尺分尺為寸也故隂得尺內一寸丁曰隂數偶也陽得寸內九分丁曰陽數奇也尺寸終始一寸九分故曰尺寸也丁曰尺寸之法舊經有注言諸家所傳撰不同藝引三寸輒相去一寸以備三寸並不見一寸九分之理其一寸九分之法者蓋為尺寸之位各有隂陽始終也陽氣者生於尺而動於寸隂氣者生於寸而動於尺是以法陽氣始生於立春上至亡種之節其數九三陽王於前法寸內九分而浮夏至之節其氣下行至立冬而終其數十即三隂王於後法尺內一寸而沈故知尺寸各有始終也此是越人引其陽中陰陽始終也所謂隂中隂陽始終者陰氣復從立秋而生下至冬至之節其數十冬至之後隨少陽上行至立夏之節其數九此者天地隂陽始終故法尺寸隂陽各有始終也天地要會之門在於四立謂之天門地戶人門鬼門人之氣口人迎左右神門亦法也楊曰寸關尺三位諸家所撰多不能同故備而論之以顯其正按皇甫士安脈訣以掌後三指為三部一指之下為六分三部凡一寸八分華他脈訣云寸尺位各八分關位三分合一寸九分王叔和脈訣云三部之位輒相去一寸合為三寸諸經如此差異則後之學者疑惑彌深然脈法始於黃帝難經起自扁鵲此之二部俱祖宗諸家諸論蓋并枝葉爾正可務本遺末不容逐末忘本今的舉指歸用明人要宜依黃帝正經以掌後三寸為三部則寸與關尺各得一寸備三才之義也此法永定不可移改其王叔和可謂得之矣凡診脈者光明三部九候之本位五藏六府之所出然後可以察其善惡以别浮沈如其本位尚迷則病源莫辨欲其愈疾亦難矣哉三部者寸關尺也九候者天地人也一部之中則有天地人三部之中合為九候以候五藏之氣也其五藏六府所出者左手寸口者心與小腸脈之所出也關上者肝與膽脈之所出也尺中者腎與膀胱脈之所出也關前一分者人迎之位也關後一分神門之位也右手寸口者肺與大腸脈之所出也關上者脾與胃脈之所出也尺中者命門三焦脈之所出也關前一分者氣口之位也關後一分者神門之位也凡五藏之脈並為隂隂脈皆沈六府之脈並為陽陽脈皆浮假令左手寸口脈浮者小腸脈也沈者心之脈也餘皆倣此斯乃脈位之綱維診候之法式也虞曰楊氏諸論數家寸尺長短部分互有不同令後人難為依據庶今明之以示後學華他之説乃如脈經言果不診矣王叔和以三寸為式義有隱微此乃黃帝正經之説豈有誤也况上古以一膚指為四寸王叔和必取其膚指之三寸與今之一寸九分短長相近也何休注公羊傳云側手為膚按指為寸即其義也况越人生於周採靈樞素問作此難經今之寸尺度量乃周之制也故越人取一寸九分為定式乃天九地十之義也二難畫圖此二難以下畫圖皆下注圖也凡此以下畫圖內黑白道以分隂陽終始其天門地戶人門鬼門是隂陽升降關格門戶其氣口人三難曰脈有大過有不及有隂陽相乘有覆有溢有關有格何謂也然關之前者陽之動脈當見九分而浮過者法曰大過減者法曰不及遂上魚為溢為外關內格此隂乘之脈也呂曰過者謂脈過九分出一寸名曰大過減者脈不及九分至八分七分六分也此為不及之脈也遂上魚者出一寸至魚際也一名溢脈一名外關之脈一名內格之脈一名隂乘之脈一脈有四名也丁曰大過者寸脈本脈浮又加實大是為陽大過也上魚者隂陽溢浮而損小者是陽不及也陽不及則隂出乘之又名隂溢此者是外關內格虞曰氣有餘脈乃大過氣不足脈乃不及外關則內脈不得出故曰不及亦曰隂乘脈內格則外脈不得入故曰大過亦曰溢脈下文關後之義反此言之也關以後者隂之動也脈當見一寸而沈過者法曰大過減者法曰不及遂入尺為覆為內關外格此陽乘之脈也呂曰過者謂脈出過一寸至一分二分三分四分五分此大過之脈也減者謂不滿一寸脈見八分七分或六分五分此為不及之脈遂入尺以言覆覆脈者脈從關至尺澤皆見也此覆行之脈所以言覆者脈從關至尺澤脈見一寸其餘伏行不見也今從關見至尺澤故言覆行也一名覆脈一名內關一名外格一名陽乘之脈也丁曰大過者為尺脈本沈又加實大名曰隂太過沈之損小者是謂不及隂不及則陽入乘之此為陽覆又名內關外格也故曰覆溢是其真藏之脈人不病而死也呂曰脈來見如此者此皆諸病相乘尅之脈非謂外邪中風傷寒之類脈巳見人雖未病病即死不可治也丁曰此者是自有增損使隂陽不守本位有此覆溢故形不病而死也虞曰隂陽不相滎脈乃上魚入尺故曰覆溢之脈脈既覆溢此由關格所致本經曰關格者不得盡其命而死也不病亦死三難畫圖凡診脈於掌後約文密排三指頭指半指之前為寸外陽中之陽半指之後為寸內陽中之隂第二指半指前為關上陽半指後關下隂半指之前尺外陽半指之後尺內隂第三指半指之前為尺外陽半指之後為尺內隂寸外陽浮散寸內隂浮大關上陽弦長關下隂弦緊尺外陽沉滑尺內隂沉澀此左手脈之隂陽察其脈狀明其覆溢四難曰脈有隂陽之法何謂也然呼出心與肺吸入腎與肝呼吸之間脾受榖味也其脈在中呂曰心肺在膈上藏中之陽故呼其氣出腎肝在膈下藏中之隂故吸其氣入脾者中州主養四藏故曰呼吸以受穀氣丁曰經言呼出者非氣自心肺而出也為腎肝在膈下主內因呼而出至心至肺故呼出心與肺也又心肺者在膈上主外故吸即隨隂而入至腎至肝故經曰呼者因陽出吸者隨隂入其呼吸陰陽相隨上下經歷五藏之間乃脾受榖味也又脾者主中州故言其脈在中也浮者陽也丁曰謂脈循行皮膚血脈之間在肌肉之上則名曰浮也楊曰按之不足舉之有餘故曰浮虞曰陽象火而炎上故曰浮也沈者隂也丁曰謂脈循行帖節輔骨名曰沈楊曰按之有餘舉之不足故曰沈虞曰隂象水而潤下故曰沈故曰隂陽也心肺俱浮何以别之然浮而大散者心也浮而短澀者肺也丁曰心者南方火也故脈來浮而大散其大者是藏散者是府也肺者西方金也金主燥其脈浮澀而短短者藏也澀者府也楊曰細而遲來往難且散或一止名曰澀也虞曰心象火明燭於外故浮大而散肺屬金其位居高故浮短而澀故曰心肺俱浮也腎肝俱沈何以别之然窂而長者肝也丁曰肝者東方木也其脈窂而長窂者藏也長者府也楊曰按之伹覺堅極故曰窂虞曰肝屬木根本生於地窂義可知枝葉長於天長理出此也按之濡舉指來實者腎也丁曰腎者北方水也主寒其性濡沉濡者藏也沉滑者府也楊曰按之不足舉之有餘謂之濡也大而長微強按之隱指幅幅然者謂之實虞曰火性外柔按之乃濡水性內剛舉指來實則其義也脾者中州故其脈在中丁曰脾者中央土也能成養四傍故隨四時而見所以經不言脈之象也楊曰脾王於季夏主養四藏其脈來大小浮沈故依四時王脈俱至四季一十八日即變寬緩是脾之王氣也上有心肺下有腎肝故曰在中也虞曰上文言呼吸之間脾受穀味此言脾者中州其脈在中榖者谷也谷空也謂人之呼吸之氣自榖而有脾土屬土位居中央土者五方物始終以之故受榖味乃處中州故曰其脈在中也是陰陽之法也脈有一隂一陽一隂二陽一隂三陽有一陽一隂一陽二隂一陽三隂如此之言寸口有六脈俱動耶然此言者非有六脈俱動也謂浮沉長短滑澀也丁曰經前引五藏之脈以應五行今引此三隂三陽之脈以應六氣其浮滑長三陽也其沉短澀三隂也凡持三部中察此六脈即可知隂陽伏匿之法也若皮膚之下是脈之下為陽部也若有此三陰之脈見是隂上乘於陽也若肌肉之下是脈之下為陰部也若有此三陽脈見即是陽氣下乘於陰也此乃是上下察隂陽之法也楊曰過於本位謂之長不及本位謂之短也浮者陽也滑者陽也長者陽也楊曰按之往來流利展轉替替然謂之滑沉者隂也短者隂也澀者陰也所謂一陰一陽者謂脈來沉而滑也丁曰其脈若在左尺而見此是腎與膀胱表裏順也若在左寸口即為病脈逆也一隂二陽者謂脈來沉滑而長也此脈見於隂部即是陽下乘於隂也一隂三陽者謂脈來沉滑而長時一沉也此者是陽伏於隂也所言一陽一隂者謂脈來浮而澀也丁曰浮澀者肺脈當見右手寸口即是本部之隂陽即順也若在左關病即是逆也一陽二隂者謂脈來長而沉澀也丁曰即乏血氣皆澀也一陽三隂者謂脈來沉澀而短時一浮也丁曰若有陽部見之此謂隂伏陽也各以其經所在名病逆順也楊曰隨春夏秋冬觀其六脈之變則知病之逆順也五難曰脈有輕重何謂也然初持脈如三叔之重與皮毛相得者肺部也如六菽之重與皿脈相得者心部也呂曰菽者豆也言脈之輕重如三豆之重在皮毛之間皮毛者肺氣所行也言肺部也心主血脈次於肺如六豆重如九菽之重與肌肉相得者脾部也呂曰脾在中央主肌肉故次心如九豆之重也如十二菽之重與筋平者肝部也呂曰肝主筋又在脾下故次之按之至骨舉指來疾者腎也呂曰腎主骨其脈沈至骨故曰腎也故曰輕重也丁曰經言菽者豆也此是診脈舉按之法也此篇當在四難之前以等隂陽高下虞曰脈之輕重經中所載甚詳若依經逐位尋之義且淺矣今舉一例為式假令左手寸口如三菽得之乃知肺氣之至如六菽之重得之知本經之至如九菽得之知脾氣之至如十二菽得之知肝氣之至按之至骨得之知腎氣之至夫如是乃知五藏之氣更相溉灌六脈因茲亦有凖繩可以定吉凶可以言疾病餘皆倣之故曰輕重也六難曰脈有隂盛陽虛陽盛隂虛何謂也然浮之損小沈之實大故曰隂盛陽虛沉之損小浮之實大故曰陽盛陰虛是陰陽虛實意也呂曰陽脈是寸口本浮而實今輕手浮而得之更損減而小故曰陽虛重手按之沈反更實大沈者隂故言隂實也丁曰陽脈本浮輕手而按其脈損至而小此是陽虛不足也隂脈本沉而濡今重手而按之損至而小是隂不足也陽脈本浮更加實大此是陽盛隂虛也素問曰諸浮者腎不足也虞曰人之所稟者隂陽也隂陽平權衡等則無更虛更實之證今言盛與虛則為病之脈脈要精微論曰隂盛則夢涉大水恐懼陽盛則夢大火燔灼隂陽俱盛則夢相殺毁傷夫如是可驗隂陽虛實之意也七難曰經言少陽之至乍小乍大乍短乍長陽明之至浮大而短太陽之至洪大而長太隂之至緊大而長少隂之至緊細而微厥隂之至沉短而敦此六者是平脈邪將病脈邪然皆王脈也其氣以何月各王幾日然冬至之後得甲子少陽王復得甲子陽明王復得甲子太陽王復得甲子太隂王復得甲子少隂王復得甲子厥隂王王各六十日六六三百六十日以成一歲此三陽三隂之王時日大要也呂曰少陽王正月二月其氣尚微少故其脈來進退無常陽明王三月四月其氣始萠未盛故其脈來浮大而短也太陽王五月六月其氣太盛故其脈來洪大而長太隂王七月八月乘夏餘陽隂氣未盛故其脈來緊大而長少隂王九月十月陽氣衰而隂氣盛故其脈來緊細而微也厥隂王十一月十二月隂氣盛極故言厥隂其脈來沉短以敦敦者沉重也四時經一隂一陽八王此難經三陽在前三隂在後其王所以不同者其移各異也難經謂從正月至六月春夏半歲浮陽用事故言三陽王在前從七月至十二月秋冬半歲沉隂用事故言三隂在後謂四時陰陽夫婦之王也丁曰夫三隂三陽之氣王隨六甲以言之此法是按黃帝六節藏象論云天以六六之節成一歲其自冬至之後得甲子即是盛年初之氣分也其甲子或在小寒之初或在大寒之後所以少陽之氣未出隂分故其脈乍大乍小乍短乍長也復得甲子陽明王其陽明之至浮大而短為二之氣其後始暄其氣未盛是故陽明之至浮大而短太陽之至洪大而長復得甲子為三之氣盛陽之分故太陽之至洪大而長也太隂之至緊大而長復得甲子為四之氣暑濕之分秋氣始生乘夏餘陽故太隂之至緊大而長也少隂之至緊細而微復得甲子為五之氣淸切之分故少陰之至緊細微也厥隂之至沉短而敦復得甲子為終之氣盛陰之分水凝而如石故厥隂之至沉短而敦也此三隂三陽之脈王隨六甲之日數故有此六脈之狀是謂平脈也八難曰寸口脈平而死者何謂也然諸十二經脈者皆係於生氣之原所謂生氣之原者謂十二經之根本也謂腎間動氣也此五藏六府之本十二經脈之根呼吸之門三焦之原一名守邪之神故氣者人之根本也根絶則莖葉枯矣寸口脈平而死者生氣獨絶於內也呂曰寸口脈平而死者非應四時脈其脈狀若平和也又曰十二經皆係於生氣之原所謂生氣之厚者為十二經本原也夫氣衝之脈者起於兩腎之間主氣故言腎間動氣狹任脈上至喉咽通喘息故云呼吸之門上係手三隂三陽為支下係足三隂三陽為根故聖人引樹以設喻也其三氣之原者是三焦之府宣行滎衝邪不妄入故曰守邪之神也人以尺脈為根本寸脈為莖葉寸脈雖平尺脈絶上部有脈下部無脈者死也楊曰寸口脈平者應四時也所云死者尺中無脈也尺脈者人之根本根本既絶則莖葉枯焉然則以尺脈為根本寸脈為莖葉故引樹以為譬也丁曰腎間動氣者謂左為腎右為命門命門者精神之所舍元氣之所係也一名守邪之神者以命門之神固守邪氣不得妄入入則死矣此腎氣先絶於內其人不病病即死矣虞曰經言十二經皆係於生氣之原謂腎間動氣也何以言之謂兩腎之間動氣者乃人之所受父母之原氣也腎者北方子之正位故聖人云元氣起於子子者坎之方位坎者即父母之元氣也謂乾為天為父坤為地為母今坎之初六六三乃坤之初六六三也坎之九二乾之九二也謂乾坤交於六三九二而成坎卦坎主子位所以元氣起於子也腎者水也黃庭經云是水之精坎之氣今言兩腎之間即人之原氣也術土云腎間曰丹田亦曰隱海中有神龜呼吸原氣故曰呼吸之門也人之三焦法天地三元之氣故曰三焦之原十二經脈慿此而生乃曰十二經之根也今寸口傳受榖氣其脈但平和奈人之生氣之原巳絶於兩腎之間則十二經無所相依據雖寸脈平和人當死矣所以喻木之無根本也腎者足少隂之經也左為腎右曰命門命門有穴在背十四推節下又有志室二穴在十四推節下兩傍各三寸有神守於命門不令邪入志室邪入志室人則死矣九難曰何以别知藏府之病耶然數者府也遲者藏也楊曰去來急促一息過五至名數也呼吸三至去來極遲故曰遲也數則為熱遲則為寒諸陽為熱諸隂為寒故以别知藏府之病也呂曰府者陽故其脈數藏者隂故其脈來遲楊曰陽脈行疾故病乃數隂脈行遲故病乃遲此直云病在藏府不顯其名則病莫知準的若數而弦者病在膽遲而弦者病在肝餘藏府悉依本狀而遲數皆倣此也虞曰陽氣亂則數隂氣虛則遲則知藏府有寒熱之證也丁曰脈者計於漏刻其春秋二分晝夜五十刻則隂陽俱等故得平和冬夏二至晝夜不等夏至之前晝六十刻故六十為數故數則為熱冬至之前夜加六十刻故隂多陽少是為寒夫隂陽漏刻可定人自有損益故遲數有加所以經云諸陽為熱諸隂為寒十難曰一脈為十變者何謂也然五邪剛柔相逢之意也假令心脈急甚者肝邪干心也呂曰夏心主脈見浮大而散今反弦弦者肝脈來干心也楊曰干猶乘也虞曰母乘子曰虛邪心脈微急者膽邪干小腸也呂曰小腸心之府脈當浮大而洪長而微弦者膽脈也虞曰陽干於陽隂干於隂同氣相求也心脈大甚者心邪自干心也呂曰心脈雖洪大當以胃氣為本今無胃甚故其脈大甚也此為心自病故言自干心也虞曰此失時脈也心脈微大者小腸邪自干小腸也呂曰小腸心之府微大者其脈小為小腸自病故言自干也虞曰小腸太陽脈也王於五六月其脈洪大而長今得之微大是知小腸之邪自干小腸也此曰正經自病法曰正邪故云自干也心脈緩甚者脾邪干心也呂曰緩者脾脈乘心故令心脈緩也虞曰心脈見緩甚此曰子之乘母法曰實邪心脈微緩者胃邪干小腸也吕曰胃脈小緩見於心部小腸心府故言干之虞曰於心部中輕手得之小緩是也心脈澀甚者肺邪干心也呂曰澀肺脈故言干心也虞曰金反凌火此曰微邪脈也心脈微澀者大腸邪干小腸也呂曰微澀大腸脈小腸心府故曰干也心脈沉甚者腎邪干心也呂曰沉者腎脈故言干也虞曰心火炎上其脈本浮今見沉形水來尅火法曰賊邪也心脈微沉者膀胱邪干小腸也呂曰微沉者膀胱脈也小腸心府故言干也五藏各有剛柔邪故令一脈輒變為十也呂曰此皆夏王之時心脈見如此者為失時脈楊曰剛柔陰陽也邪者不正之名非有身王氣而水來干身為病者通為之邪也虞曰推此十變之候乃五行勝復相加故聖人謂之五邪也五藏各有表裏更相乘之一脈成十故十變也有陽有陰故曰剛柔也於本位見他脈故曰相逢干也聖人乃以心一藏為例其餘皆可知也丁曰其言肝邪干心膽邪干小腸者此皆虛邪干心也心邪自干心小腸邪自干小腸者此皆為正邪也髀邪干心胃邪干小腸者此皆為實邪也肺邪干心大腸邪干小腸者此皆微邪也腎邪干心膀胱邪干小腸者此皆賊邪也所謂剛柔相逢者則十雜也其十雜者甲與巳合甲為剛巳為柔戊與癸合戊為剛癸為柔丁與壬合丁為剛壬為柔丙與辛合丙為剛辛為柔乙與庚合乙為剛庚為柔凡剛柔相逢為病者剛甚則為病重柔甚則為病微柔甚剛謂從所不勝於剛故為病甚也剛逢柔謂從所勝於柔故為病微也其一脈十變之法是師引此一部之中二經説此五邪相干為之十變凡兩手三部各有二經六部之內各有五邪十變也故從其首計其數六部十變也數有六十是謂六十首也黃帝曰先持隂陽然後診六十首之謂也十一難曰經言脈不滿五十動而一止呂曰經言一藏五十動五藏二百五十動謂之平脈不滿五十動者無有五十動也是以一藏無氣也一藏無氣者何藏也然人吸者隨隂入呼者因陽出今吸不能至腎至肝而還故知一藏無氣者腎氣先盡也楊曰按經言持其脈口數其至也五十動而不一代者五藏皆受氣是為平和無病之人矣四十動而一代者一藏無氣四歲死三十動而一代者二藏無氣三歲死二十動而一代者三藏無氣二歲死十動而一代者四藏無氣一歲死不滿十動而一代者五藏無氣也七日死難經言止本經言代按止者按之覺於指下而中止名止代者還尺中停久方來名曰代也止代雖兩經不同據其脈狀亦不殊别故兩存之虞曰此與第八難生氣獨絶之義略相似八難言父母生氣源巳絶於兩腎之間故云死也此言一藏無氣言呼吸之間肺行榖氣腎間父母之原氣亦無穀氣所養原氣漸耗乃知四歲必死故云腎氣先盡也丁曰五十動者是天地隂陽以漏刻為制度人之脈息為自有損益故無常數其益過於六十心肺有餘也心肺有餘則腎肝不足也其損者不及四十之數則心肺不足乃腎肝有餘也今陽氣虛少故不滿五十也其言動而止者謂吸不能至腎至肝而還此是陽不榮於下故腎氣先絶也絶則止也此法又與生氣獨絶於內同法也十二難曰經言五藏脈巳絶於內用針者反實其外五藏脈巳絶於外用針者反實其內內外之絶何以别之然五藏脈巳絶於內者腎肝氣巳絶於內也而醫反輔其心肺五藏脈巳絶於外者其心肺脈巳絶於外也而醫反輔其腎肝陽絶補隂隂絶輔陽是謂實實虛虛損不足益有餘如此死者醫殺之耳呂曰心肺所以在外者其藏在隔上上氣外為滎衛浮行皮膚血脈之中故言絶於外也腎肝所以在內者其藏在膈下下氣內養筋骨故言絶於內也丁曰夫五藏內外者為心肺在膈上通於天氣也心主於脈肺主於氣外華榮於皮膚故言外也腎肝在下通於地氣以藏精血最於骨髓心肺外絶絶則皮聚毛落腎肝內絶絶則骨痿筋緩診其脈學者不能明於內外虛實致使針藥誤投所以實實虛虛損不足益有餘如此死者是醫殺之耳王翰林集注黃帝八十一難經卷之一釋音一難滎衛上于平反二難際音祭盡也三難覆芳福切反復也乘食陵切侵也濡乳兖切下同四難别之上彼列反澀音色五難菽音叔六難沉持林反七難敦都昆反厚也八難莖音衡九難數色角切十難緩音換
