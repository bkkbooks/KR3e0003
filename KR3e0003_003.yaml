front:
  text: 王翰林集注黃帝八十一難經卷之三
  hash: sha256:4f08f481b2d9c4ca59a713d5a4452d62ece1cba21e5faecac3929096c09dbe26
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0003_SBCK_003-1a}
body:
  text: 盧國秦越人撰呂廣丁德用楊玄操虞庶楊康侯注解王九思王鼎象石友諒王惟一校正附音釋二十難曰經言脈有伏匿伏匿於何藏而言伏匿耶然謂隂陽更相乘更相伏也脈居隂部而反陽脈見者為陽乘陰也丁曰其部非獨言寸為陽尺為隂也若以前後言之即寸為陽部尺為隂部若以上下言之曰肌肉上為陽部肌肉下為隂部今隂虛不足陽入乘之故隂部見陽脈其脈乘時見沉澀而短此是陽中伏陰也楊曰謂尺中浮滑而長脈雖時沉澀而短此謂陽中伏隂也脈居陽部而反隂脈見者為隂乘陽也丁曰寸口之內肌肉之上時見沉澀短也楊曰尺中巳浮滑而長又時時沉澀而短故曰陽中伏隂寸口關中沈短而澀也脈雖時浮滑而長此謂陰中伏陽也丁曰寸口之內肌肉之下脈時見浮滑而長者是隂中伏陽也楊曰寸關巳沉短而澀澀而時時浮滑而長故曰隂中伏陽也重陽者狂重隂者癲脫陽者見鬼脫隂者目盲丁曰重陽者狂謂脈浮滑而長加於實數所以狂言大事自高自賢狂越棄衣其脫隂者目盲視物卒失故言盲也盲猶荒也重隂者癲癲者蹶也其脫陽者視其暗中見鬼是故經言重陽者狂重隂者癲脫陽者見鬼脫隂者目盲也虞曰寸口曰陽又今重見陽脈三倍以上故曰重陽其病狂惑自高賢智登高而歌棄衣而走罵詈不避親迹故曰狂尺中曰隂而尺脈重見隂故曰重陰其為病也名曰癲疾謂僵仆於地閉目不酲隂極陽復良久却醒故曰癲也今天吊之類是也人之所稟者陰與陽隂陽平則權衡等今隂氣巳脫陽氣獨盛五藏屬隂五藏行氣血溉灌上榮於目今隂氣巳脫五藏之氣不榮於目故目盲無所見故曰脫隂者目盲也楊曰重隂者陽氣並於上也謂關以前既浮滑而長兼實強復喘數是謂重陽也重隂者謂尺中既沉短而澀而又盛實是謂重陰脫陽者無陽氣也謂關以前細微甚也故目中妄見而覩鬼物焉脫隂者謂尺中微細甚也隂者精氣也精氣脫故盲盲脫之言失也謂亡失陰陽之氣也二十一難曰經言人形病脈不病曰生脈病肜不病曰死何謂也丁曰此者五藏各有所主也肺主氣心主脈脾主肌肉肝主筋腎主骨其心肺主息脈為通天氣邪不可中邪中則息脈不相應形雖下病當知死矣腎肝脾皆主其形皆通地氣邪中則害其形其脈不病者皆生形脈皆病者不可理此是五藏各主其形脈故言大法也然人形病脈不病非有不病者也謂息數不應脈數也此大法呂曰形病者謂五藏損形體羸瘦氣微脈反遲與息不相應其脈不相應為形病也脈病者謂數諸至脈巳病人雖未頭痛寒熱方病不久病病則死虞曰人形病脈不病者謂形苦而志樂或勞形於事以致肌體瘦羸脈息俱呼吸大小雖合常經息數必違此大法故曰形病脈不病也脈病人不病者其人必外多眷慕內結想思脈病形安形樂志苦以致傷脈息反常不及有餘乍遲乍數及乎病而不死爰焉故曰脈病人不病也二十二難曰經言脈有是動虞曰言反常之動也有所生病虞曰脈動反常故云有所生病一脈輒變為二病者何也然經言是動者氣也所生病者血也虞曰氣病傳血此乃一脈變為二病邪在氣氣為是動虞曰脈動反常邪在氣也邪在血血為所生病虞曰氣受邪傳之與血故血為所生病氣主詬之虞曰詬之氣流行之貌也血主濡之丁曰氣主詬之詬詬謂吹噓往來之象血主濡之濡謂濡軟也氣行則血行氣止則血止虞曰濡者濡潤之貌言人身所稟者氣血也氣血通行沮潤人身其為病也乃如下説也氣留而不行者為氣先病也血壅而不濡者為血後病也故先為是動後所生病也丁曰人一身經脈通行氣血或居一經脈中氣留不行故血壅不濡其氣先病名曰是動血壅不濡後病名曰所生此是一脈輒變為二病也虞曰上文言脈有是動動為陽謂氣先受熱熱亦傳於血氣血皆受熱則津液妄行是知脈有是動此言留而不行謂氣血津液妄行賊風薄之故不行也氣傳之與血故血壅而不濡潤復受賊風故血亦住而病也楊曰經言手太隂之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下循臑內行少隂心主之前下肘腎內上骨下廉入寸口上循魚際出大指之端其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨而喘咳故缺盆中痛甚則交兩手而瞀是為腎厥是主肺所生病者咳上氣喘渴心煩胸滿臑腎內前廉痛厥掌中熱氣盛有餘則肩背痛也汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息溺色變略舉此一經為例餘經皆可知也凡人所以得主命者氣與血也氣為陽陽為衛血為隂隂為榮二氣常流所以無病也邪中於陽陽為氣故氣先病陽氣在外故也若在陽不治則入於陰中隂為血故為血後病血在內故也氣實則熱氣虛則寒血實則為寒血虛則為熱隂陽之道理其然也凡一藏之病有虛有實有寒有熱有內有外皆須知藏府之所在識經絡之流行隨其本原以求其疾則病形可辨而針藥無失矣如其不委斯道則雖命藥投針病難愈也故黃帝曰夫十二經脈者所以調虛實處百病決生死不可不通哉此之謂也虞曰凡人血流據氣氣動依血凝留而不行壅而不濡是知為病也二十三難曰手足三隂三陽脈之度數可曉以不然手三陽之脈從手至頭長五尺五六合三丈楊曰一手有三陽兩手合為六陽故曰五六合三丈也虞曰手太陽之脈自兩手小指之端循腎上行之耳珠子前長五尺兩手合一丈手陽明之脈起於兩手大指次指之側上循腎絡於鼻左之右右之左長五尺兩手合一丈手少陽之脈起於兩手小指次指之端上臂終於耳前長五尺兩手合一丈故曰五六合三丈也手三隂之脈從手至胸中長三尺五寸三六一丈八尺五六三尺合二丈一尺楊曰兩手各有三隂合為六隂故曰三六一丈八尺虞曰手太隂之脈起於中焦下絡大腸還循胃口屬肺出腋下下肘入寸口上魚際出乎大指之端長三尺五寸兩手合七尺手少隂之脈起於心中出屬心系下絡小腸上肺出腋下循臂出手小指之端長三尺五寸兩手合七尺手厥隂之脈起於胸中屬心包絡三焦出脅腋下循臑入肘下出小指次指之端長三尺五寸兩手合長七尺故曰二丈一尺足三陽之脈從足至頭長八尺六八四丈八尺楊曰兩足各有三陽故曰六八四丈八尺也按此脈度數七尺五寸中人之肜而云長八尺理則難解然足之六陽從足指而向上行由其紆曲故曰八尺也虞曰足太陽之脈起於兩足小指之側上循膝交膕中循背上頭下入目內眥長八尺兩足上行合一丈六尺足陽明之脈起於足大指次指之端循足脛上夾臍左右各二寸終於額角髮際長八尺兩足合一丈六尺足少陽之脈起於足小指次指之端上循兩膝外廉入季脅上循目外眥長八尺兩足合一丈六尺故曰四丈八尺也足三隂之脈從足至胸長六尺五寸六六三丈六尺五六三尺合三丈九尺楊曰兩足各有六隂故曰六六三丈六尺也按足太隂少隂皆至舌下足厥隂至於頂上今言至胸中者蓋據其相按之次也虞曰足太隂之脈起於足大指內側循足脛內廉上交出厥陰脈之前上循入腹屬肝絡胃連舌本長七尺五寸兩行合長一丈五尺足厥隂之脈起於足太指聚毛之上循足跗上廉去內踝一寸上踝八寸交出足太隂之後循股入隂毛中環隂器抵少腹俠胃屬肝絡膽循喉嚨入頑顙連目系出額長六尺五寸兩行合長一丈三尺足少隂之脈起於足小指之下斜趣足心上腨股內貫脊屬腎絡膀胱貫肝入肺循喉嚨俠舌本長六尺五寸合長一丈三尺故云三丈九尺人兩足蹻脈從足至目長七尺五寸二七一丈四尺二五一尺合一丈五尺楊曰人長七尺五寸而蹻脈從踝至目不得有七尺五寸也今經言七尺五寸者是腳脈上於頭而行焉言至目者舉其綱維也虞曰人有隂蹻陽蹻二脈兩足合四脈陽蹻者起於跟中循外踝上行入風池隂蹻者亦起於跟中乃是足少隂之别絡也自然骨之後上內踝之上直上循隂股入隂循股上胸裏入缺盆上出人迎之前入頄內廉屬目內眥合太陽脈長七尺五寸兩行合一丈五尺準此推之至目者推尺是兩足隂蹻脈也故經言從足至目長七尺五寸以合一丈五尺是也督脈任脈各長四尺五寸二四八尺二五一尺合九尺凡脈長一十六丈二尺此所謂十二經脈長短之數也丁曰此篇云十二經脈長短又言隂蹻從足至目又言督任二脈何獨不言陽蹻陽蹻亦起於跟中循外踝上入風池亦長一丈五尺言之則據經丈尺有剩不言有此闕漏更俟後賢其脈上云八尺者其中庸之人以省尺言之皆得四尺今尺者非黍尺也皆以同身寸之為尺大小言之皆八尺楊曰督脈起於脊􅘡上於頭下於靣至口齒縫計則不止長四尺五寸今言四尺五寸者當取於上極於風府而言之也手足合十二脈為二十四脈並督任兩蹻又四部合為二十八脈以應二十八宿凡長一十六丈二尺滎衛行周此數則為一度也故曰長短之數也虞曰經言督脈起於下極之俞并於脊裏上至風府入屬於腦長四尺五寸任脈者起於中極之下以上毛際循腹上關元至咽喉長四尺五寸督任計之長合九尺也以上十二經合二十四脈合長一十三丈八尺兼之督任隂蹻三脈合長二丈四尺共二十七脈合長一十六丈二尺以法三九之數應漏水下二刻楊氏言二十八脈乃陽蹻亦係其數推之二蹻四行則尺寸有餘也楊氏言二十八脈誤矣經脈十二絡脈十五何始何窮也然經脈者行血氣通隂陽以榮於身者也其始從中焦注手太隂陽明陽明注足陽明太隂太隂注手少隂太陽太陽注足太陽少隂少隂注手心主少陽少陽注足少陽厥隂厥隂復還注手太隂别絡十五皆因其原如環無端轉相溉灌朝於寸口人迎以處百病而決死生也丁曰此者天地隂陽一歲終始於二十四氣日月曉昏終始於二十四時人之榮衛行經絡二十四條故復會於寸口人迎其言寸口者手太隂脈口也其穴名曰太淵故脈會於太淵其十二經十五絡皆輔三焦而生故始從中焦注手太隂陽明所以處百病決死生也楊曰行手太陽訖即注手陽明行手陽明訖即注足陽明輪轉而行餘皆倣此也虞曰其始從中焦者謂直兩乳間名曰膻中穴亦名氣海言氣從此而起注太隂肺也肺行訖傳之與手陽明也素問曰膻中為臣使之官謂胃化味為氣自此上傳於肺也楊曰經脈十二絡脈十五凡二十七氣以法三九之數天有九星地有九州人有九竅是也其經絡流行皆朝會於寸口人迎所以診寸口人迎則知其經絡之病死生之侯矣虞曰厥隂還注手太隂如此推尋丈尺則前後經義相違離聖久遠難為粗述經曰明知終始隂陽定矣何謂也然終始者脈之紀也寸口人迎隂陽之氣通於朝使如環無端故曰始也楊曰經脈流行應於天之度數周而復始故曰如環無端也終者三隂三陽之脈絶絶則死死各有形故曰終也楊曰隂陽氣絶其候亦見於寸口人迎見則死矣其死各有形診故曰終也丁曰所言三陰三陽之脈絶絶則死死各有形其義本經自解在二十四難中二十四難曰手足三隂三陽氣巳絶何以為候可知其吉凶不然足少陰氣絶即骨枯少隂者冬脈也伏行而溫於骨髓故骨髓不溫即肉不著骨骨肉不相親即肉濡而却肉濡而却故齒長而枯髮無潤澤者骨先死戊日篤巳日死丁曰足少隂之經腎脈也屬木王冬內榮於骨髓外華於髮其氣絶則齒本長骨枯髮無潤澤故戍日篤而巳日死也此足少隂絶之形也楊曰足少陰腎脈也腎主冬故云冬脈也腎主內榮骨髓故云伏行而溫於骨髓也腎氣既絶則不能榮骨髓故肉濡而却却結縮也謂齒齦之肉結縮而故齒漸長而枯燥也謂齒乾燥色不澤也腎為津液之主今無津液故使髮不潤焉戊巳土也腎水也土能尅水故云戊日篤巳日死也虞曰陰陽有少壯故有三隂三陽以通氣血以養人身是故三隂乃有離合太隂為開厥隂為闔少隂為樞開者司動靜之基闔者執禁固之權樞者主動轉之微三經不得相失今足少隂腎脈巳絶是故一經相失少隂不得為樞動轉之微不主矣故曰死也診要經終論曰少隂終者面黑齒長而垢腹脹閉上下不通而終矣此之謂也足太陰氣絶則脈不榮其口唇口唇者肌肉之本也脈不榮則肌肉不滑澤肌肉不滑澤則肉滿肉滿則唇反唇反則肉先死甲日篤乙日死丁曰足太隂經者脾之脈也屬土王季夏其氣內養肌肉外華衛於口唇其氣絶則唇反肉滿故甲日篤而乙日死也此是足太隂絶之形也楊曰足太隂脾脈也脾主肌肉其氣既絶故肌肉麁澀而唇反甲乙木也脾土也木能尅土故云甲日篤乙日死也虞曰口唇肉之所終亦曰脾之華今唇反色靑木賊土也故曰死矣隂陽之離合以太隂為開謂司動靜之基今脈巳絶則動靜之基乃失司存故曰死也素問日太隂終者腹脹閉不得息善嘔嘔則逆逆則靣赤也足厥隂氣絶即筋縮引卵與舌卷厥隂者肝脈也肝者筋之合也筋者聚於隂器而絡於舌本故脈不榮則筋縮急即引卵與舌故舌卷卵縮此筯先死庚日篤辛日死筋縮急丁曰足厥陰經者肝之脈也屬木王春氣內飬於於筋外則上係舌本下環於隂器其氣絶則舌卷卯縮故庚日篤而辛日死也此足厥隂絶之形也楊曰足厥隂肝脈也肝主筋其氣既絶故筋縮急而舌卷卯縮庚辛金也肝木也金能尅木故云庚日篤而辛日死也手太隂氣絶即皮毛焦太陰者肺也行氣溫於皮毛者也氣弗榮則皮毛焦皮毛焦則津液去津液去即皮節傷皮節傷則皮枯毛折毛折者則毛先死丙日篤丁日死丁曰手太隂經者肺之脈也屬金王秋其氣內主於氣外榮於皮毛其氣絶則津液去皮毛焦故丙日篤而丁日死也楊曰手太隂肺脈也肺主行氣故曰溫皮毛丙丁火也肺金也火能尅金故云丙日篤丁日死也虞曰肺行衛氣以飬皮毛今皮毛焦則知火來爍金皮枯毛折脈絶其為離合與足太隂同法也手少隂氣絶則脈不通脈不通則血不流血不流則色澤去故靣黑如梨此血先死壬日篤癸日死丁曰手少陰經者真心脈也屬君火王夏主於榮通於脈也其經非不言手厥隂心包絡為主相火相行君命主通榮氣今真心氣絶則榮氣不行榮氣不行則血不流行是以色澤去故面黑如黧壬日篤而癸日死此者是病非老憊也梨字當作此黧字楊曰經云手三隂今此推釋太隂少隂而心主一經不言之何也然心主者心包絡之脈也少陰者心脈也二經同候於心故言少隂絶則心主亦絶其診既同故不别解也本經云靣黑如漆柴此云如梨漆柴者恆山苗也其草色黃黑無潤澤故以為喻梨者即人之所食之果也亦取其黃黑焉言人即無血則色黃黑似此二物無光華也壬癸水也心火也水尅火故云壬日篤癸日死也虞曰心主血血乃為榮榮華人身故有光華之色今脈巳絶血乃不行故人色夭面黑如梨是知水來賊火離合與足少隂同三隂氣俱絶者則目眩轉目瞑目瞑者為失志失志者則志先死死即目瞑也丁曰所言三隂者獨是言足三隂也足少隂者腎也腎藏精與志足厥隂肝也肝藏魂通於目故絶則失志而亂魂去目眩也楊曰三隂者是手足三隂脈也此五藏之脈也五藏者人之根本也故三隂俱絶則目瞑瞑閉也言根絶於內而華諸於外目者人之光華也眩亂也言目亂不識人也腎藏精與志精氣巳竭故曰失志也三隂絶皆止得一日半死也虞曰五藏之脈皆屬三隂五藏之脈皆會於目今三隂俱絶故目眩目瞑也人之五志皆屬於隂謂肝志怒心志喜脾志思肺志憂腎志恐今三隂巳絶五藏皆失其志故無喜怒憂思恐五志俱亡故曰失志也楊氏言失志乃止言腎一藏也本經曰隂陽相離則悵然失志此之謂也六陽氣俱絶者則隂與陽相離隂陽相離則腠理泄絶汗乃出大如貫珠轉出不流即氣先死且占夕死夕占且死丁曰所言六陽是手足三陽也後言隂與陽相離者謂手三陽通天氣故曰陽也足三隂通地氣故云隂也天地隂陽否隔所以言隂陽相離也是故腠理泄絶汗乃出大如貫珠故其死不移旦夕也楊曰此六陽氣絶不出日死六陽氣絶之狀今略條之經云太陽脈絶者其絶也戴眼反折瘈瘲其色白絶汗乃出出則終矣少陽脈絶者其絶也耳聾百節盡縱目環絶系絶系一日半死其色靑者乃死陽明脈絶者其絶也口耳張善驚妄言色黃其上下經盛而不仁則終矣此是三陽絶之狀也前云六陽今經曰三陽絶狀者手足諸陽脈絶其絶狀並同所以不别出隂與陽相離者隂陽隔絶不相朝使也腠理泄者陽氣巳下毛孔皆開所以然也絶汗乃汗出如珠言身體汗出著肉如綴珠而不流散故曰貫珠也旦占夕死夕占旦死者正得半日也惟少陽絶得一日半矣虞曰隂陽相離氣位隔絶腠理開疏汗乃大出夫如是則六陽皆絶其死明矣况三陽之脈亦有離合太陽為開陽明為闔少陽為樞開者司動靜之基闔者執禁固之權樞者主轉動之微三經不得相失今六陽巳絶失其動靜之司弛其禁固之樞止其動轉之微三經相失故曰死也六陽者素問曰上下經乃成六也經絡大數第二凡二首二十五難曰有十二經五藏六府十一耳其一經者何等經也然一經者手少隂與心主别脈也心主與三焦為表裏俱有名而無形故言經有十二也丁曰言少隂與心主别脈者謂心與小腸為表裏心主與三焦為表裏也少隂是真心脈為君火心主者共三焦相火故别也相行君命故有心名無位也楊曰手少隂真心脈也手心主心包絡脈也二脈俱是心脈而少隂與少陽合心主與三焦脈合三焦有位而無形心主有名而無藏故二經為表裏也五藏六府各一脈為十一脈心有兩脈合成十二經焉據此而言六府亦止五府耳虞曰心主者手厥隂脈也三焦者手少陽脈也二經合為表裏乃合為十二經也手厥隂心包絡脈者起於胸中出屬心包下膈歷絡三焦其支者循胸中出脅下腋三寸上抵腋下下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中出中指之端準此推之心包外有經脈出於中指內相維絡於三焦歸於少隂之經配手厥隂之脈手少陽脈者出於手小指次指之端上出次指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦準此推尋乃與心包更相維絡三焦配手少陽心包配手厥隂二經俱外有流行經脈內無藏府故配之為表裏諸家脈惟言命門與三焦為表裏在右手尺中惟此經言則三焦與心主為表裏也又左寸火右寸金左關木右關土左尺水右尺火左尺男右尺女可驗之經有夫婦對位若三焦配命門為表裏則木火同位也二十六難曰經有十二絡有十五餘三絡者是何等絡也然有陽絡有隂絡有脾之大絡陽絡者陽蹻之絡也隂絡者隂蹻之絡也故絡有十五焉丁曰十二經十五絡者謂每一經各有一絡其肝心腎經在左即絡右其脾肺心包經在右即絡左其陽蹻經在左足外踝絡在右足外踝其隂蹻經在右足內踝絡在左足內踝此者是隂蹻陽蹻之絡也脾之大絡者脾象土主中宮王四季分飬四藏故曰脾之大絡是名大包穴在淵液下三寸布胸中出九助間是也楊曰十二經各有一絡為十二絡耳今云十五絡者有隂陽之二絡脾之大絡合為十五絡也人有隂陽兩蹻在兩足內外男子以足外者為經足內者為絡女子以足內者為經足外者為絡故有隂陽蹻二絡也經云男子數其陽女子數其隂當數者為經不當數者為絡此之謂也脾之大絡名曰大包此則脾有二絡也凡經脈為表裏支而橫者為絡絡之别者為孫也奇經八脈第三凡三首二十七難曰脈有奇經八脈者不扚於十二經何謂也然有陽維有隂維有陽蹻有隂蹻有衝有督有任有帶之脈凡此八脈者皆不拘於經故曰奇經八脈也經有十二絡有十五凡二十七氣相隨上下何獨不拘於經也然聖人圖設溝渠通利水道以備不然天雨降下溝渠溢滿當此之時雱霈妄行聖人不能復圖也此絡脈滿溢諸經不能復拘也丁曰前言十二經十五絡二十七氣相隨上下流通氣血相貫無有休息今此八脈謂别道而行故曰奇經八脈也其所起言在後章楊曰奇異也此之八脈與十二經不相拘制别道而行與正經有異故曰奇經也其數有八故曰八脈也虞曰奇音基也竒斜也奇零也不偶之義謂此八脈不係正經隂陽無表裏配合别道奇行故曰竒經也所以經言八脈不拘於經以此可驗矣楊氏言奇異之義非也二十八難曰其奇經八脈者既不拘於十二經皆何起何繼也然督脈者起於下極之俞並於脊裏上至風府入於腦丁曰督脈起於下極之俞者長強穴在脊骶督脈絡任脈絡會之所並於脊裏上至風府穴在髮上一寸督脈陽維所會奇經之一脈也吕曰督脈者陽脈之海也楊曰督之為言都也是人陽脈之都綱人脈比於水故呂氏曰陽脈之海此為奇經之一脈也下極者長強也虞曰經言督脈起於下極上入屬於腦呂氏曰諸陽之海也楊氏曰陽脈之都綱據其督脈流行起自會隂穴循脊中上行至大推穴與手足三陽之脈交會上至瘖門穴與陽維會其所上至百會穴與太陽交會下至於鼻柱下水溝穴與手陽明交會準此推之實謂為諸陽之海陽脈之都綱也任脈者起於中極之下以上毛際循腹裏上關元至喉咽丁曰中極者穴名也在齊下四寸其中極之下者曲骨穴也是任脈所起其循腹裏上關元至咽喉者天突冗也是任脈之所會奇經之二脈也楊曰任者妊也此是人之生養之本故曰位中極之下長強之上此奇經之二脈也虞曰據針經推尋任脈起於會隂穴上毛際者乃是曲骨穴在少腹下毛際與足厥陰會於此上至關元乃齊下二寸也至咽喉與陰維脈會也素問曰女子二七天癸至任脈通衝脈盛月事以時下故能有子也故楊氏曰生餋之本良由此也衝脈者起於氣衝並足陽明之經夾齊上行至胸中而散也呂曰衝脈者隂脈之海丁曰衝脈起於氣衝并足陽明之內俠任脈之外上行至胸中而散皆起於兩間此者是三焦行氣之府也故呂氏云一本曰衝者此之謂也楊曰經云衝脈者十二經之海也如此則不擉為隂脈之海恐呂氏誤焉衝者通也言此脈下至於足上至於頭通受十二經之氣血故曰衝焉此奇經之三脈也虞曰素問曰衝脈起於氣街難經曰起於氣衝又針經穴中兩存其名衝街之義俱且通也素問曰並足少隂之經難經却言並足陽明之經况少隂之經俠齊左右各五分陽明之經俠齊左右各二寸氣衝又是陽明脈氣所發如此推之則衝脈自氣衝起在陽明少隂二經之內俠齊上行其理明矣大體督脈任脈衝脈此三脈皆自會隂穴會合而起二脈分為三岐行於隂陽部分不同故名各異也帶脈者起於季脅廽身一周丁曰季脅下一寸八分是其帶脈之穴也回身一周是奇經之四脈也楊曰帶之為言束也言㧾束諸脈使得調柔也季脅在助下下接於髐骨之間是也廽繞也繞身一周猶如束帶焉此奇經之四脈也陽蹻脈者起於跟中循外踝上行入風池丁曰陽蹻脈起於跟中循外跟者中衝穴也上入風池穴者項後髮際陷中是奇經之五脈也楊曰蹻捷疾也言此脈是人行走之機要動足之所由故曰蹻脈焉此奇經之五脈也隂蹻脈者亦起於跟中循內踝上行至咽喉交貫衝脈丁曰隂蹻脈亦起跟中循內踝者照海穴也上行至咽喉交貫衝脈其又至目下承泣穴是隂蹻脈始終也是奇經之六脈也楊曰其義與陽蹻同也此奇經之六脈也虞曰隂蹻者起於足然骨之後上內踝之上循隂股入隂而循腹上胸裏入缺盆出人迎之前入頄內廉屬目內眥合於太陽陽蹻而上行陽維隂維者維絡于身溢畜不能環流灌溉諸經者也故陽維起於諸陽會也陰維起於諸隂交也丁曰陽維者維絡諸陽故曰陽維起於諸陽會也隂維者維絡諸隂故曰隂維起於諸隂交也楊曰維者維持之義也此脈為諸脈之網維故曰維脈也此有隂陽二脈為奇經八脈也比于聖人圖設溝渠溝渠滿溢流于深湖故聖人不能拘通也而人脈隆聖入於八脈而不環周故十二經亦不能拘之其受邪氣畜則腫熱砭射之也丁曰凡八脈為病皆砭射取之楊曰九州之內有十二經水以流泄地氣人有十二經脈以應之亦所以流灌身肜之血氣以奉生身故比之於溝渠也虞曰十二經隆盛入於八脈而不環周邪在八脈腫熱畜積故以砭石射刺之故曰砭射之也二十九難曰奇經之為病何如然陽維維於陽隂維維於隂陰陽不能自相維則悵然失志溶溶不能自收持呂曰悵然者其人驚驚即維脈緩故令人身不能收持驚則失志善忘恍惚也丁曰陽維者是隂陽之綱維也而主持隂陽之脈今不能相維者是陽不能主持諸陽隂不能主持諸陽成言悵然失志也溶溶者緩慢所以不能收持也隂蹻為病陽緩而隂急陽蹻為病隂緩而陽急呂曰隂蹻在內踝上病則其脈從內踝以上急外踝以上緩也陽蹻在外踝上病則其脈從外踝以上急內踝以上緩也丁曰奇經八脈者而聖人圖設溝渠之理以備通水道焉非自生其病盡諸經隆盛而散入也乃砭射取之諸陽脈盛散入陽蹻則陽蹻病諸隂脈盛散入隂蹻則隂蹻病故隂蹻陽蹻乃為病耳其隂陽緩急者即是虛實之義隂蹻為病則陽緩而隂急即病隂厥足徑直而五絡不通陽蹻為病則隂緩而陽急即狂走不臥死蹻者健也衝之為病逆氣而裏急丁曰逆氣腹逆也裏急腹痛也呂曰衝脈從關元上至咽喉故其脈為病逆氣而裏急虞曰衝脈並足少隂之經夾齊上行病故逆氣裏急矣巢氏病源曰腎氣不足傷於衝脈故逆氣而裏急督之為病脊強而厥呂曰督脈在脊病則其脈急故令其脊強也丁曰督脈起於下極之俞行脊裏上入風池病則故脊強任之為病其內苦結男子為七疝女子為瘕聚呂曰任脈起於胞門子戶故其脈結為七疝瘕聚之病丁曰任脈起胞門日戶循腹裏上關元至咽喉病則故男子內結為七疝女子為瘕聚虞曰任脈當少腹上行故其內苦結男子病七疝者謂厥疝槃疝寒疝癥疝附疝狼疝氣疝此七病由氣血虛弱寒溫不調致之也女子病為瘕聚瘕有八瘕謂靑瘕黃瘕燥瘕血瘕狐瘕蛇瘕鱉瘕脂瘕瘕者謂假於物形是也帶之為病腹滿腰溶溶若坐水中呂曰帶脈者廽帶人之身體病則其腹緩故令腰溶溶也丁曰帶脈者廽帶人之身病則腰溶溶也陽維為病苦寒熱隂維為病苦心痛呂曰陽為衛故寒熱隂為榮榮為血血者心故心痛也丁曰陽維主於諸陽之經病則苦寒熱隂維主於諸隂之經病則苦心痛也此竒經入脈之為病也楊曰一本云衝脈者起於關元循腹裏直上于咽喉中任脈者起於胞門子戶俠齊上行至胸中二本雖不同亦俱有所據並可依用故并載之呂氏注與經不同者由此故也虞曰據素問言衝脈起氣街俠齊上行至胸中任脈起於中極謂當齊心上行也以上呂楊氏所舉皆非也榮衛三焦第四凡二首三十難曰榮氣之行常與衛氣相隨不然經言人受氣於穀榖入於胃乃傳與五藏六府五藏六府皆受於氣其淸者為榮濁者為衛榮行脈中衛行脈外榮周不息五十而復大會隂陽相貫如環之無端故知榮衛相隨也丁曰夫人之生稟天真之氣後飮水榖食入胃傳於五藏六府化為精血其精血各有淸濁其精中淸者歸肺以助天真其濁者堅強骨髓故血中之淸者歸心榮養於神血中之濁者外華於肌肉而淸者行於脈肉濁者行於脈外而衛者衛訣之義也楊曰營行作榮榮者榮華之義也言人百骸九竅所以得榮華者由此血氣也營者經營也言十二經脈常行不巳經紀人身所以得長生也二義皆通焉衛者護也此是人之慓悍之氣行於經脈之外晝行於身夜行於藏衛護人身故曰衛氣凡人隂陽二氣皆會於頭手足流轉無窮故曰如環之無端也心榮血肺衛氣血流據氣氣動依血相慿而行故知榮衛相隨也虞曰經言人受氣於榖榖入胃乃傳與五藏六府者謂水榖入口下至於胃胃化榖為氣上傳與肺肺乃主氣氣乃為衛胃化水上傳與心心乃生血血乃為榮氣為表行於脈外血為裏行於脈內二者相依而行故一日一夜五十周於身復會於手太陰如環之無端轉相溉灌也經言淸氣為榮濁氣為濁詳此淸濁之義倒言之為正恐傳寫誤也隂陽應象論曰淸陽實四支濁隂歸六府即其義也三十一難曰三焦者何稟何生何始何終其治常在何許可曉以不然三焦者水榖之道路氣之所終始也楊曰焦元也天有三元之氣所以生成萬物人法天地所以亦有三元之氣以養人身形三焦皆有其位而無正藏也虞曰天有三元以統五運人有三焦以統五藏也今依黃庭經配八卦屬五藏法三焦以明人之三焦法象三元也心肺在上部心法離卦肺法兌卦乾卦主上焦乾為天所以肺行天氣脾胃在中部脾胃屬土統坤卦艮亦屬土艮為運氣主治中焦腎肝在下部腎法坎卦肝法震卦異卦主下焦主通地氣行水道夫如是乃知坎離震兌坤以法五藏乾艮巽乃法三焦以合八卦變用乃如下説上焦者在心下下膈在胃上口主內而不出其治在膻中玉堂下一寸六分直兩乳間陷者是楊曰自膈以上名曰上焦主出陽氣溫於皮膚分肉之間若霧露之溉焉胃上口穴在鳩尾下二寸五分也虞曰膻中者穴名也直兩乳中是穴任脈氣之所發素問曰膻中為臣使之官以主氣布隂陽氣和志遠喜樂由生謂布氣也故治其中矣上焦主入水穀內而不出其為病止言冷熱虛則補其心實則㵼其肺如此治者萬無一失靈樞經曰上焦如霧謂行氣如露溉灌諸經也言胃氣自膻中布氣與肺下溉灌諸藏經曰肺行天氣即此義也中焦者在胃中脘不上不下主腐熟水榖其治有齊傍楊曰自齊以上名曰中焦變化水穀之味生血以榮五藏六府及於身體中脘穴在鳩尾下四寸也虞曰中焦乃脾胃也中焦為病止言冷熱虛則補其胃實則㵼其脾如此治者萬無一失靈樞經曰中焦如漚謂腐熟水榖也其治在齊傍齊傍左右各一寸乃足陽明胃脈所發夾齊乃天樞穴也中焦主脾胃故治在此經中故曰齊傍也下焦者當膀胱上口主分别淸濁主出而不內以傳導也其治在齊下一寸楊曰自齊以下名曰下焦齊下一寸隂交穴也主通利溲便以時下而傳故曰出而不內也虞曰下焦為病止言冷熱虛則輔其腎實則㵼其肝如此治者萬無一失靈樞經曰下焦如瀆謂膀胱主水也素問曰三焦為決瀆之官水道出焉齊下一寸乃足三隂任脈之會其治在茲乃下紀也故名曰三焦其府在氣街一本曰衝丁曰靈蘭祕典論曰三焦者決瀆之官引導隂陽水穀故言三焦者水榖之道路也布氣於胸中故治在膻中穴也其府在氣街而或曰衝者二義俱通言氣街者即陰陽道路也言氣衝者氣衝脈也氣衝者十二經根本諸經行氣之府也故言府在氣衝也楊曰氣街者氣之道路也三焦既是行氣之主故云府在氣街街衢也衢者四達之道焉一本曰衝此非扁鵲之語蓋呂氏再録之言别本有此言於義不可用也虞曰氣街在少腹毛中兩旁各二寸是穴乃足陽明脈氣所發言其三焦主三元之氣其府在氣街其氣街者針經本名氣衝衝者通與四達之義不殊兩存之亦可也以氣街為府者何也謂足陽明胃化榖為氣三焦又主三元之氣故以氣街為府也藏府配像第五凡六首三十二難曰五藏俱等而心肺獨在膈上者何也然心者血肺者氣血為榮氣為衛相隨上下謂之榮衛通行經絡營周於外故令心肺在膈上也丁曰心肺主通天氣故在膈上楊曰自齊以上通為陽自齊以下通為隂故經曰腰以上為天腰以下為地天陽地隂即其義也今心肺既居膈上而行榮衛故云榮周於外虞曰心為帝王高居遠視肺為華蓋位亦居膈心主血血為榮肺主氣氣為衛血流據氣氣動依血血氣相依而行故心肺居在上焦也三十三難曰肝靑象木肺白象金肝得水而沉木得水而浮肺得水而浮金得水而沉其意何也然肝者非為純木也乙角也庚之柔大言陰與陽小言夫與婦釋其微陽而吸其微隂之氣其意樂金又行隂道多故令肝得水而沉也丁曰五行既定即有剛柔配合夫婦柔納其剛今經舉肝靑象木木性本浮今肝得水沉者謂又懹金性也又木七月受氣正月臨官行其隂道多是故肝得水而沉也楊曰四方皆一隂一陽東方甲乙木甲為陽乙為隂餘皆如此又甲為木乙為草丙為火丁為灰戊為土巳為糞庚為金辛為石壬為水癸為池又乙帶金氣丁帶水氣巳帶木氣辛帶火氣癸帶土氣此皆五行王相配偶故言肝者非為純木也隂陽交錯故也木生於亥而王於卯故云行隂道多東方甲乙木畏西方庚辛金故釋其妹乙嫁庚為婦故曰庚之柔柔隂也乙帶金氣以歸故令肝得水而沉也虞曰乙與庚合從夫之性故得水而沉也肺者非為純金也辛商也丙之柔大言隂與陽小言夫與婦釋其微陰婚而就火其意樂火又行陽道多故令肺得水而浮也丁曰肺白象金金性本沉今肺反浮謂辛納火性又正月受氣七月臨官行其陽道多是故肺得水而浮也楊曰金生於巳王於酉故云行陽道多西方庚辛金畏南方丙丁火故釋其妹辛嫁丙為婦故曰丙之柔辛帶火氣以歸故令肺得水而浮也虞曰丙與辛合隨夫之性炎上而浮故云也肺熟而復沉肝熟而復浮者何也故知辛當歸庚乙當歸甲也丁曰皆歸本性也楊曰肝生沉而熟浮肺生浮而熟沉此是死則歸本之義熟諭死矣如人夫婦有死亡者未有子息各歸其本極陰變陽寒盛生熟壅久成通聚而必散故其然也義之反覆故浮沉改變也三十四難曰五藏各有聲色臭味可曉知以不然十變言肝色靑虞曰五色之變在于木也五藏五色由肝木之氣更相溉灌故各從其類見其色黃庭經云肝者木之精震之氣其色靑位居東方其臭臊虞曰得火之變故其臭則臊也其味酸虞曰土受木味則酸洪範曰曲直作酸酸取其收斂也其聲呼虞曰金木相配發聲為呼呼亦嘯也其液泣虞曰泣則言淚也此乃水行氣溉灌於子故生泣也心色赤虞曰木之布色在火乃赤也其臭焦虞曰五臭之變在于火五藏五臭火盛則焦苦出焉故曰其臭焦也其味苦虞曰火性炎上故生焦苦故洪範云炎上作苦本經云脾主甘受味火由土受之則味苦取其燥泄也其聲言虞曰金火相當夫婦相見發聲為言素問云笑其液汗虞曰水火交泰蒸而成汗脾色黃虞曰脾土在中央其色黃此乃木之布色在土乃黃也其臭香虞曰火之化土其臭則香也其味甘虞曰脾土味甘甘能受味以取寬緩行五味以養五藏各從其數以配其味在本性則甘故洪範云稼穡作甘也其聲歌虞曰金土相生母子相見發聲為歌其液涎虞曰水之行液在脾成涎肺色白虞曰木之布色在肺乃白也其臭腥虞曰火之變在金則腥也其味辛虞曰土之受味在肺為辛辛取其散潤也其聲哭虞曰凡五音之發在于金金發五音以出五藏各從其類以發其聲金在本性為哭者謂肺屬金金商也商傷也主於秋秋愁也故在志則悲哭此之謂也其液涕虞曰水之行液在肺成涕腎色黑虞曰木之布色在腎乃黑淮南子云水者積陰之氣而成水也取其積隂故其色乃黑其臭腐虞曰火主臭在水為腐臭也啓玄子云因水變為腐也其味鹹虞曰土之受味在水作鹹鹹取其柔耎也其聲呻虞曰子之見母乃發嬌呻之聲也其液唾虞曰凡五液皆出於水水行五液分灌五藏故諸藏各有液也在本宮則為唾也是五藏聲色臭味也丁曰其言五聲五色五味五音五液此者是五藏遞相榮飬過此則病也楊曰五藏相通各有五五五合為二十五以相生養也五藏有七神各何所藏耶然藏者人之神氣所舍藏也故肝藏魂肺藏魂心藏神脾藏意與智虞曰心有所憶謂之意水從其夫故有智也腎藏精與志也丁曰五藏七神者宣明五氣篇注云心藏神精氣之化成也肺藏魄精氣之匡輔也靈樞經云並精而出入者謂之魄肝藏魂神氣之輔弼也靈樞經曰隨神而往來者謂之魂脾藏意與智意主所思智主其記腎藏精與志專意而不移者也靈樞經曰意之所在謂之志又云守其精者謂之志也虞曰氣之所化謂之精意之所存謂之志楊曰肝心肺各一神脾腎各二神五藏合有七神三十五難曰五藏各有所府皆相近而心肺獨去大腸小腸遠者何謂也經言心滎肺衛通行陽氣故居有上大腸小腸傳隂氣而下故居在下所以相去而逺也又諸府者皆陽也淸淨之處今大腸小腸胃與膀胱皆受不淨其意何也然諸府者謂是非也丁曰經言諸府皆陽淸淨之處者為手足三陽為行氣之府故言淸淨之處也今大腸小腸胃膀胱為傳化之府故言非也楊曰謂是非者言諸府各别其所傳化此為是也小腸為府此為非也何為如此然小腸者雖配心為表其治則别其氣則通其氣雖通其所主又異所以雖曰心病而無心别位故曰非也經言小腸者受盛之府也大腸者傳㵼行道之府也膽者淸淨之府也胃者水穀之府也膀胱者津液之府也楊曰此各有此傳也一府猶無兩名故知非也小腸者心之府大腸者肺之府胃者脾之府膽者肝之府膀胱者腎之府楊曰此是小腸與心通氣也餘並同矣小腸謂赤腸大腸謂白腸膽者謂靑腸胃者謂黃腸膀胱者謂黑腸下焦所治也丁曰皆謂隨五藏之色相配而言也楊曰腸者取其積貯熱治之義也故以名之然六府五藏之正色也三十六難曰藏各有一耳腎獨有兩者何也然腎兩者非皆腎也其左者為腎右者為命門命門者諸神精之所舍原氣之所繫也故男子以藏精女子以繫胞故知腎有一也丁曰命門者諸神精之所舍原氣之所繫也故男子藏精女子係胞也是知腎有一也其言命門者非右尺也為人之主命之門也腎屬水故知以其右尺為相火行君火之命今亦名命門即非腎之命門也蓋同名而異義也楊曰腎雖有兩而一非腎故脈經曰左手尺中為腎脈右手尺中為神門脈此其義也腎者人生之根本神門者元氣之宗始故云精神之所舍也神門亦命門也虞曰經云右為命門元氣之所係也脈經言與三焦為表裏三焦又主三元之氣準此推之三焦自命門之所起也屬手少陽火配心包手厥隂火為表裏其理明矣三十七難曰五藏之氣於何發起通於何許可曉以不然五藏者當上關於九竅也故肺氣通於鼻鼻和則知香臭矣肝氣通於目目和則知白黑矣脾氣通於口口和則知穀味矣心氣通於舌舌和則知五味矣腎氣通於耳耳和則知五音矣楊曰七竅者五藏之門戶藏氣平調則門戶和利矣五藏不和則九竅不通楊曰五藏失和於內九竅壅塞於外也今上有七竅而云九者二竅幽隱所以不言腎氣上通於耳下通於二隂故云九竅也六府不和則留結為癰丁曰不和者為府與藏不和者邪氣不得外泄則害其九竅六府不得內通則留結為雍凡人藏府隂陽和即如水之流不得息也如環之無端莫知其紀周而復始也楊曰六府陽氣也陽氣不和則結癰腫之屬故云為雍也邪乘氣來先遊於府也邪在六府則陽脈不和陽脈不和則氣留之氣留之則陽脈盛矣邪在五藏則隂脈不和隂脈不和則血留之血留之則隂脈盛矣陰氣太盛則陽氣不得相營也故曰格陽氣太盛則隂氣不得相營也故曰關隂陽俱盛不得相營也故曰關格關格者不得盡其命而死矣丁曰內外不相濟是為關格故知死矣楊曰人之所有者氣與血也氣為陽血為隂隂陽俱盛或俱虛或更盛或更虛皆為病也經言氣獨行於五藏不營於六府者何也然氣之所行也如水之流不得息也故隂脈營於五藏陽脈營於六府如環之無端莫知其紀終而復始其不覆溢人氣內溫於藏府外濡於腠理丁曰諸隂不足陽入乘之為覆諸陽不足隂出乘之為溢也此者是氣之獨行也楊曰覆溢者謂上魚入尺也若不如此當行不止故云終而復始焉藏府度數第六凡十首三十八難曰藏唯有五府獨有六者何也然所以府有六者謂三焦也有原氣之别焉主持諸氣有名而無形其經屬手少陽此外府也故言府有六焉丁曰其言五藏六府者謂五藏應地之五行其六府應天之六氣其言天之六氣謂三焦為相火屬手少陽故言府獨有六也楊曰三焦無內府惟有經脈名手少陽故曰外府也三十九難曰經言府有五藏有六者何也然六府者正有五府也然五藏亦有六藏者謂腎有兩藏也其左為腎右為命門命門者謂精神之所舍也男子以藏精女子以繫胞其氣與腎通故言藏有六也府有五者何也然五藏各一府三焦亦是一府然不屬於五藏故言府有五焉丁曰五藏正有五府今曰三焦是為一府配心包絡為藏即藏府皆有六焉其二經俱是相火相行君命故曰命門也楊曰五藏六府皆五有五六之數或俱五或俱六或一五或一六並應天地之數也若以正藏府言之則藏府俱有五也藏五以應地之五嶽府五以應天之五星若以俱六言之則藏六以應六律府六以應乾數若以藏五府六言之則藏六以應五行府六以法六氣若以府五藏六言之則藏六以法六隂府五以法五常所以藏府俱五者手心主非藏三焦非府也藏府俱六者合手心主及三焦也其餘例可知也虞曰天以六氣司下地以五行奉上天地交恭五六之數而成也人法三才所以藏府以法五六之數謂人頭圓象天足方象地以藏府五六之數以象人則三才備矣十一之數相因而成故不離於五六也漢書云五六乃天地之中數也王翰林集注黃帝八十一難經卷第三音釋二十難癲都田反盲乎光反二十二難詬香句反二十三難蹻訖約反二十四難眩榮絹切二十八難跟古痕切蹕戶瓦切砭陂驗切二十九難疝所晏反瘕古訝切三十一難膻徒亶切脘古卵切三十四難蘇曹切
