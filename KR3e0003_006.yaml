body:
  text: 難經集注䟦難經集注五卷明王九思等集錄吳呂廣唐楊玄操宋丁德用虞庻楊康侯注解者按晁公武郡齋讀書志載呂楊注一卷丁注五卷虞注五卷陳振孫書錄解題載丁注二卷馬端臨經籍考引晁氏作呂楊注五卷葢當時各家别行至九思等始掇輯以便觀覽耳葉盛菉竹堂書目載難經集注一冊不著撰人名氏此則書名偶同非九思所集按王圻續經籍考載金紀天錫難經集注五卷盛之所收恐此耳盛正統進士九思弘治進士則其非是編也明矣其他諸家藏弆書目及乾隆四庫全書總目竝未收入若殷仲春醫藏目錄宜裒蒐無遺而亦遺之葢似失傳者然以余不渉醫家伹知據目錄攷之耳因質諸醫官多紀廉夫廉夫云近代醫書絕無援引久疑散佚廉夫於醫家雅稱賅洽而其言如此則知其果失傳也夫方伎一家固有其人其存其佚何干我事然小道可觀至理存焉則竟非可棄也癸亥花朝天瀑識
