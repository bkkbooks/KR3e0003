body:
  text: 難經集注跋難經集注五卷明王九思等集録吳呂廣唐楊玄操宋丁德用虞庶楊康侯注解者按朝公武郡齋讀書志載呂楊注一卷丁注五卷虞注五卷陳振孫書録解題載丁注二卷馬端臨經籍考引朝氏作呂楊注五卷蓋當時各家别行至九思等始掇輯以便觀覽耳葉盛菉竹堂書目載難經集注一册不著撰人名氏此則書名偶同非九思所集按王圻續經籍考載金紀天錫難經集注五卷盛之所收恐此耳盛正統進士九思弘治進士則其非是編也明矣其他諸家藏弆書目及乾隆四庫全書總目並未收入若殷仲春醫藏目録宜裒搜無遺而亦遺之蓋似失傳者然以余不涉醫家伹知據目録考之耳因質諸醫官多紀廉夫廉夫云近代醫書絶無援引久疑散佚廉夫於醫家雅稱賅洽而其言如此則知其果失傳也夫方伎一家固有其人其存其佚何干我事然小道可觀至理存焉則竟非可棄也癸亥花朝天瀑識
