front:
  text: 王翰林集註黃帝八十一難經卷之二
  hash: sha256:9eaf4019830536ae4ed99bb6c29495b9470ad38558a4bf724111f5399c4e46d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0003_SBCK_002-1a}
body:
  text: 盧國秦越人撰呂廣丁德用楊玄操虞庻楊康侯註解王九思王鼎象石友諒王惟一校正附音釋十三難曰經言見其色而不得其脉反得相勝之脉者卽死得相生之脉者病卽自巳色之與脉當參相應爲之奈何然五藏有五色皆見於面亦當與寸口尺內相應假令色靑其脉當弦而􅇥呂曰色青肝也弦􅇥者肝脉是謂相應也虞曰色青脉弦中外相應也素問曰肝部在目下於此視色以參脉證色赤其脉浮大而散呂曰色赤心也浮大而散心脉也是謂相應虞曰色赤脉大色脉相應也素問曰心部在口視色合脉色黃其脉中緩而大呂曰色黃者脾也中緩而大脾脉也虞曰此色脾相應也素問曰脾部在唇色見其中以應脉狀色白其脉浮濇而短呂曰白者肺也浮濇而短脉脉也虞曰肺部見於闕庭兩眉上也色黑其脉沉濇而滑呂曰色黑者腎色也腎主水水性沉腎亦在五藏之下故其脉沉濡而滑虞曰腎色之見於肌皮在靣取其地閣此所謂五色之與脉當參相應也呂曰此正經自病不中他邪故也虞曰謂應本經虛實之證也丁曰經言色靑脉弦而􅇥色赤脉浮而散色黃脉中緩而大色白脉浮濇而短色黑脉沉濡而滑此是五藏色脉皆相應謂正經自病無他色也脉相則所以言當參相應也脉數尺之皮膚亦數丁曰數卽心也所以腎內皮膚􅀬也脉急尺之皮膚亦􅇥丁曰􅇥者臂內經絡滿實所以堅急也脉緩尺之皮膚亦緩丁曰緩者肌肉消故皮膚亦緩弱也脉濇尺之皮膚亦濇丁曰肺主燥所以臂內皮膚亦濇也脉滑尺之皮膚亦滑丁曰腎主水其脉滑所以臂內皮膚亦滑也此五者皮膚滑濇急緩數又與色脉參同也呂曰此謂隂陽藏府浮沉滑濇相應也五藏各有聲色臭味當與寸口尺內相應丁曰其言相應者脉數色亦皮膚􅀬此是心之一藏色脉皮膚參相應也脉急色靑皮膚經絡堅􅇥而青此是肝之一藏色脉皮膚參相應也脉緩色黃皮膚緩此是脾之一藏色脉皮膚參相應也脉濇色白皮膚濇此是肺之一藏色脉皮膚參相應也脉滑色黑皮膚滑此是腎之一藏色脉皮膚叅相應也凡診脉者先須循腎之內外然後診脉視色也虞曰肝脉弦其色靑其聲呼其臭羶其味酸心脉􅇝其色赤其聲笑其臭焦其味苦脾脉緩其色黃其聲歌其臭香其味甘肺脉濇其色白其聲哭其臭腥其味辛腎脉沉其色黑其聲呻其臭腐其味鹹此謂相應也其不相應者病也虞曰相應謂正經自病也假令肝病脉弦色青多呼好羶喜酸此曰自病也不相應者乃如下說假令肝病脉濇色白多哭好腥喜辛此曰相反聲色臭味皆見肺之證候金之賊木此曰賊邪不相應必死也假令色靑其脉浮濇而短若大而緩爲相勝浮大而散若小而滑爲相生也呂曰色青者肝也浮濇而短者肺也肺勝肝爲賊邪若大而緩爲脾脉也肝勝脾故言相勝也浮大而散心脉也心爲肝之子若小而滑腎脉也腎爲肝之母肝爲腎之子子母相生故爲相生也丁曰經引肝之一藏其脉當弦􅇥其色當青卽爲順也色靑脉濇者逆也脉􅀂大而緩是肝勝於脾也其病甚故云相勝􅀂脉浮大而散若小而滑是爲相生也經言知一爲下工知二爲中工知三爲上工上工者十全九中工者十全八下工者十全六此之謂也呂曰五藏一病輒有五今經載肝家一藏爲例耳解一藏爲下工解二藏爲中工解五藏爲上工丁曰上工者謂全知色脉皮膚三法相生相勝本始故治病十全其九中工知二謂不能全収故治病十全得八下工知一謂不解明於全法一心治巳病故十全得六也虞曰工者萬學萬全乃曰工也凡爲醫者窮難經察脉之浮沉藏府虛實通素問知經脉徃來針之補㵼窮本草識藥之寒溫氣味所歸全此三家然後治病可曰知三爲上工也醫不三世不服其藥謂非工也素問曰五藏之象可以類推五藏相錯可以意識此可曰工也十四難曰脉有損至何謂也然至之脉一呼再至曰平呂曰平者謂平調之脉也丁曰平者無過之脉也虞曰人之呼吸曰隂陽也一呼一吸謂之一息經言一呼再至一吸再至謂之平脉也人呼吸法隂陽一息法一年一息脉動四至四至法四時一呼脉行三寸法三陽一吸脉行三寸法三隂故曰平也三至曰離經呂曰經言再至曰平三至曰離經不知經言也其人必病丁曰謂加於隂之二倍故曰離經虞曰經者常也謂脉離常經之所細而言之人一呼脉行三寸一吸脉行三寸呼吸定息脉行六寸一日一夜一萬三千五百息脉行八百一十丈乃爲一周後從始起之經再行令一呼脉三至脉行四寸半一吸三至脉行四寸半一息脉行九寸一日一夜一萬三千五百息脉行一千二百一十五丈過於半脉不在所起之經再起故曰離經也舉一例以擬之如人一日周行百里却從初行之處再行日平今一日却一百五十里過於五十里不在周而復始之處再行故曰離經也四至曰奪精呂曰其人病困奪精者鼻目唇口精候奪色診見也丁曰謂加於隂四倍故曰奪精虞曰平脉一息行六寸今奪精之脉一息行一尺二寸此乃一日一夜息數乃行兩日夜脉度數尺寸脉諸夫爲數脉者陽氣亂况陽爲病頗亦狂言顏色恍懽呂氏言鼻目唇口精候色奪者非也夫人納五味味歸形形歸氣氣歸精今一息四至乃陽氣亂故脉數數則氣耗耗則精無所歸獨加奪去故曰奪精如人一日行一百里今一日行二百里氣疲之則耗也五至曰死呂曰其人病證􅀱巳見脉復加一至定當死也虞曰此之平脉一倍過半四至巳是奪精五至其死明矣丁曰爲加於隂六倍故曰死也六至曰命絕此死之脉呂曰不出日死虞曰五至死之漸也六至今死矣此言死之脉也必是言至之脉也必是言至之脉恐寫之誤可合下文何謂損一呼一至曰離經丁曰爲隂加於陽四倍也虞曰前之至脉離經謂脉行過半此之損脉離經謂脉行減半以下吸養於呼也二呼一至曰奪精丁曰謂隂加於陽六倍也虞曰平人脉一日一夜五十周身今二呼而脉一至一日一夜不及一十三筒周身脉只行及二百二丈五尺其人氣耗血枯神惨色夭精華猶如奪去三呼一至曰死虞曰平人之脉三呼脉六至一日一夜八百一十丈無危今三呼脉一至脉只行一寸半一日一夜只行及六十七丈五尺不及五周身如此之候死可待也四呼一至曰命絕此謂損之脉也虞曰四呼當八至今四呼脉一至一日一夜不及四周身氣血巳盡藏敗神去故命絕也至脉從下上損脉從上下也呂曰至脉從下上者謂脉動稍増上至六至多而呼七損脉從上下者謂脉動稍減至一呼多而至少也損脉之爲病柰何然一損損於皮毛皮聚而毛落虞曰一損損肺肺主皮毛故皮聚而毛落也二損損於血脉血脉虚少不能榮於五藏六府也虞曰二損損血脉是知心受之心主血今則心血枯不能榮於五藏六府也三損損於肌肉肌肉消瘦飮食不爲肌膚虞曰脉之三損損於脾脾者受納五味以化生五氣藏府以長肌膚今旣損故味不化則肌肉消瘦也四損損於筋筋緩不能自收持虞曰四損損肝病乃如是素問曰其有傷筋縱若其不容容容不収持也五損損於骨骨痿不能起於床反此者至於􅀵病也虞曰今之五損損於腎腎主骨故骨痿不能起於床素問曰腎􅀬則腰脊不舉骨枯髄減􅀤爲骨痿痿者無力也呂曰􅀵者取也經伹載損家病不載至家病至家者諸陽六府病六府病苦頭痛身􅀬忽特不利與損家病異今反載損家病證故損脉於此受病非是至家病也從上下者骨痿不能起於床者死呂曰從肺損至骨五藏俱盡故死肺在上也虞曰至此推窮損家病證一損肺二損心三損脾四損肝五損腎乃如第五難脉輕重菽數下損之腎也從下上者皮聚而毛落者死呂曰從腎損之肺亦復五藏俱盡故死也此是損家然病證非至家病證腎在下故也治損之法奈何然損其肺者益其氣呂曰肺主氣今損故當以針藥益其氣也丁曰肺者主其氣故損卽補之以針補其手大隂經中兪大淵穴也以辛味佐不足卽是益其氣也損其心者調其榮衛呂曰心者滎衞之本今損當以針藥調之丁曰心者主榮衛故損卽􅀘之以針􅀘其手少隂經中井手厥陰經中井是其母手少衝手中衝亦是其母以苦味佐之此調其榮衞之現也虞曰心主血血爲憂愁思慮傷於心因茲致損凡人血流㨿氣氣動依血宣調榮衞節憂愁思慮以治之損其脾者調其飮食適寒温呂曰脾主飮食今其氣衰損榖不消化故當調適寒溫也丁曰脾損則調其飮食適其寒温謂脾主意思故順其意思飮食適其寒溫也虞曰脾化水穀以生氣血今見脾損飮食不爲肌肉宜調節飮食無令傷脾也適其寒温者啟玄子謂春凉食夏冷食秋温食冬􅀬食也本經曰飲食勞倦傷脾也損其肝者緩其中呂曰肝主怒其氣急故以針藥以緩其中丁曰肝主怒以甘緩其中以土味和其肝當補足厥隂合曲泉穴是也虞曰怒則氣逆脉乃强急以慿方術以緩其中素問曰肝苦􅇥􅇥食甘以緩之又曰宜食甘粳米生肉棗葵味皆甘甘性緩也損其腎者益其精此治損之法也呂曰腎主精今損故以針藥補益其精氣丁曰益其精者以鹹味􅀘之當補足少隂經中復溜穴是其母也虞曰耗周過多而致損腎宜慿鹹味以􅀘精華脉有一呼再至一吸再至有一呼三至一吸三至有一呼四至一吸四至有一呼五至一吸五至有一呼六至一吸六至虞曰此重明前之至脉病證乃如後說有一呼一至一吸一至有再呼一至再吸一至有呼吸再至虞曰此重明損脉輕重生死當如後􅀃脉來如此何以别知其病也然脉來一呼再至一吸再至不大不小曰平一呼三至一吸三至爲適得病虞曰脉三至曰離經反於常經知病始得前大後小卽頭痛目眩虞曰病在三陽前小後大卽胸滿短氣丁曰前大者爲寸外大也後小者寸內小也寸前大則頭痛目眩寸後大者胸滿短氣經言寸部法天主胸以上至頭有疾故也虞曰病在三隂一呼四至一吸四至病欲甚虞曰脉病反常經法曰奪精之脉脉大法曰渾渾革至如涌泉者病進欲甚之理明也脉􅇝大者苦煩滿虞曰病在三陽陽盛煩滿沉細者胸中痛虞曰病在三隂隂主於內故腹中病也滑者傷􅀬虞曰脉動如徐前却流利替替然􅀬盛於氣其脉滑也濇者中霧露虞曰濇脉狀如刀刮竹寒盛於血故脉乃濇也一呼五至一吸五至其人當困虞曰脉一息十至氣血勞走不困受爲生死如下說沉細夜加浮大晝加虞曰隂脉細沉夜加可驗陽脉浮大晝甚可加不大不小雖困可治其有大小者爲難治虞曰極大陽大盛必減極小隂水弱必竭故曰難治一呼六至一吸六至爲死脉也虞曰三倍於常陽氣亂極故故曰死也沉細夜死虞曰隂絕使然浮大晝死虞曰陽絕如是一呼一至一吸一至名曰損虞曰此損至離經之脉證人雖能行猶當著床所以然者血氣皆不足故也再呼一至呼吸再至名曰無魂無魂者當死也人雖能行名曰行尸虞曰尋此至數與前義相違亦恐錯簡也魂屬陽陽主生今脉形如是减損乃知陽絕陽絕則魂去故人死也上部有脉下部無脉其人當吐不吐者死上部無脉下部有脉雖困無能爲害也所以然者譬如人之有尺樹之有根枝葉雖枯槁根本將自生脉有根本人有元氣故知不死丁曰經言脉有從上下者是謂五藏之氣不相榮養致令有此損至也五藏之氣隨呼吸上下逓相榮養其心脉主氣脉則隨吸而榮其腎肝其吸不能至腎至肝者盖腎先損則病骨痿也其腎肝不榮於上故先病其肺病則皮聚毛落也其損甚者皆死一呼再至曰平一呼三至卽是陽加於隂二倍也適得病也其脉洪大曰離經前大者謂寸外大也後小者謂寸內小也前小者寸外小也後大者寸内大也前大後小則頭痛目眩前小後大卽胸滿短氣經曰上部法天以候胸以上至頭素問曰寸外以前主頭角耳目寸內以後主胸中關以上主膈下脇傍關內以後主腹中尺外以前主臍下尺內以後主至足下凡左右有此大小隨部言之一呼四至謂陽氣加隂四倍故曰奪精也二呼一呼者是隂加於陽四倍亦曰奪精其浮大者陽病甚若煩滿也加於滑者傷於􅀬極也其沉細者隂病甚所以腹中痛也加於濇者中霧露所作也一呼五至一吸五至沉細則夜甚浮大則書甚其有內外大小者遊魂也此不可療其數至愈増愈減者死上部有脉下部無脉其人自當􅀤吐其不吐是氣獨絕於内也上部無脉下部有脉雖困無能爲害者謂神不守也神昏如魚掉尾者死楊曰上部寸口下部尺中也虞曰此又明人稟父母之無氣也十五難曰經言春脉弦夏脉鈎秋脉毛冬脉石是王脉耶將病脉也然弦鈎毛石者四時之脉也春脉弦者肝東方木也萬物始生未有枝葉故其脉之來濡弱而長故曰弦呂曰春萬物始生未有枝葉形狀正􅈂如􅁌故脉法之也丁曰春脉弦者㣲弦曰平平者謂有胃氣胃者土也能成於四方間於四旁故四時脉見弦鉤毛石皆當微見卽是有胃氣也但獨見四時之脉者皆無胃氣也夏脉鈎者心南方火也萬物之所盛垂枝布葉皆下曲如鈎故其脉之來疾去遲故曰鈎呂曰心脉法火曲如鉤又陽盛其脉來疾隂虚脉去遲也脉從下上至寸口疾還尺中遲寸口滑不􅂥故今其脉環曲如鉤秋脉毛者肺西方金也萬物之所終草木華葉皆秋而落其枝獨在若毫毛也故其脉之來輕虛以浮故曰毛呂曰肺浮在上其氣主皮毛故今其脉浮如毛也冬脉石者腎北方水也萬物之所藏也盛冬之時水凝如石故其脉之來沉濡而滑故曰石呂曰腎脉法水水凝如䂖又伏行温於骨髓故其脉實牢如石也此四時之脉也如有變柰何然春脉弦反者爲病何謂反丁曰反者爲見秋脉如毛是謂肝病然其氣來實强是謂太過病在外呂曰實强者陽氣盛也少陽當微弱今更實强謂太過陽主表故今其病在外也丁曰病在外者是少陽其脉微弦今實强者是膽有餘面青好怒是肝木之外證也氣來虛微是謂不及病在内呂曰厥隂之氣養於筋其脉弦今更虛㣲故曰不及陰處中故今其病在內丁曰病在內者肝不足也肝含血養筋不足則筋緩溲便難是肝之內證也虞曰太過之脉謂不至而至不及之脉謂脉息虚微太過眩冐巓疾其不及則令人胸痛引背下則兩脇脹滿也氣來厭厭聶聶如循榆葉曰平呂曰春少隂厥隂俱合主其脉之來如春風吹榆葉濡弱而調故曰平脉也益實而滑如循長竿曰病呂曰此謂弦多胃氣少也丁曰長而不軟故若循竿是爲病也急而勁益强如新張􅃓弦曰死呂曰此謂但弦無胃氣也丁曰謂强􅇥而緊細故曰如新張弓弦也春脉㣲弦曰平弦多胃氣少曰病但弦無胃氣曰死春以胃氣爲本呂曰胃主水榖故人稟胃氣丁曰胃者水榖之海五藏皆授氣於榖胃者主稟四方故以胃氣而爲本也夏脉鈎反者爲病何謂反丁曰胃脉來石滑如冬之脉故曰反然其氣來實强是謂太過病在外吕曰實强者太陽受氣盛也太陽者浮散今反實强故曰太過也丁曰其外者太陽小膓爲府故病在外其面赤喜笑是心火之外證也氣來虚微是謂不及病在內呂曰手少隂主血脉其氣尚平實今反見虛微故曰不及也丁曰少隂心夏盛王今反虚微是謂不及不及則病在內喜笑其神不守虞曰少隂心脉本平實今反虛微故曰不及也太陽小膓脉本浮大今反實强曰太過也其太過不及之證乃如下􅀃玉機眞藏論曰夏脉太過其病身􅀬而膚痛爲浸􅁋其不及者令人煩心上見咳嗽下爲氣􅂥也其脉來累累如環如循琅玕曰平呂曰心滿實累累如人指循琅玕者是金銀鐶釧之物勁也此皆實之􅀋也故云平丁曰言心脉滿實累累如連珠其言循琅玕者謂琅玕是玉與珠類貫如環之象也來而益數如雞舉足者曰病呂曰心脉但當浮散不當數也雞舉足者諭其數也丁曰心脉但當浮散今又加其至數卽病故諭其脉如雞舉足走也前曲後居如操帶鈎曰死呂曰後居謂之後直如人革帶之鈎前曲後􅈂也是謂但鉤無胃氣丁曰操者執也如手埶革帶前鈎曲無力也後居倨而不動勁有故曰死也夏脉㣲鈎曰平鈎多胃氣少曰病但鉤無胃氣曰死夏以胃氣爲本呂曰胃者中州主養於四藏也秋脉㣲毛反者爲病何謂反然氣來實强是謂太過病在外呂曰肺脉者當㣲毛今更實强故曰病在外丁曰外者謂手陽明大隂也故外證靣白善嚏悲愁不樂皮毛乾燥此是肺金之外證也氣來虚㣲是謂不及病在內呂曰肺脉輕虛浮如毛今按之益虛㣲是無胃氣故病在內丁曰病在内者手太隂肺也其内證喘咳洒浙寒􅀬此是肺金之內證也虞曰太過不及病如下說玉機眞藏論曰秋脉太過則令人逆氣而背痛愠愠然秋脉不及則令人喘呼吸少氣上氣見血下聞病音其脉來藹藹如車蓋按之益大曰平呂曰車蓋乃小車之蓋輕浮藹藹然也按之益大有胃氣故曰平也丁曰如車之曲蓋偃藹之狀故曰平也不上不下如循雞羽曰病呂曰如循雞羽者是其氣虛微胃氣少故曰病丁曰手太隂肺金乘夏餘陽故其脉上又其氣當於下降今不上不下如循雞羽者但當濇濇然故曰病也按之消索如風吹毛曰死呂曰此無胃氣丁曰風吹毛者飄騰不定無歸之象故曰如風吹毛而死也秋脉微毛爲平毛多胃氣少曰病伹毛無胃氣曰死秋以胃氣爲本呂曰四藏皆須稟胃氣也冬脉石反者爲病何謂反然其氣來實强是謂太過病在外呂曰冬脉當沉濡今反實强故曰太過太過者陽脉病故言病在外也丁曰反者冬得長夏之脉長夏者土也胃土脉緩而㣲曲故病也在外者是足太陽之經也靣黑善恐欠是其腎水之外證也氣來虛微是謂不及病在內呂曰冬脉沉濡今反虚微故言不及不及者陰病在內也丁曰足少隂腎脉也主水王冬其脉沉濡而滑今虛㣲少氣是謂不及病在內其内證氣逆小腹􅇥痛泄如下重此腎水內證也虞曰冬脉太過則令人解㑊謂似病不病也春脉痛而少氣不欲言也冬脉不及則令人心如懸病飢􅆌中淸春中痛少腹滿小便變也脉來上大下兌濡滑如雀之啄曰平呂曰上大者足太陽下兌者足少隂隂陽得所爲胃氣强故謂之平雀啄謂本大未兌也丁曰腎脉本性濡滑今診之應手而大去而小故曰上大下兌喻如雀啄是謂平也啄啄連屬其中㣲曲曰病呂曰啄啄者不息故謂之連屬其中㣲曲是脾來乗腎脉緩而曲故病丁曰啄啄謂如雀啄啄連連時止腎衰之病也來如解索去如彈石曰死呂曰解索謂虚縵無根本也來遲去疾故曰彈石也丁曰診之應手如脫解之索無力也去疾而如彈石是腎死也冬脉微石曰平石多胃氣少曰病但䂖無胃氣曰死冬以胃氣爲本胃者水榖之海也主稟四時故皆以胃氣爲本是謂四時之變病死生之要㑹也虞曰胃屬土土者五也萬物歸之故曰水谷之海一年王辰戍丑未故曰主稟四時謂弦鈎毛石四時之經皆得胃氣爲本􅀂胃氣少則人病􅀂無胃氣則人死故曰四時變病死生之要㑹也萬物非土孕育則形質不成也易曰坤厚載物德合無疆脾者中州也其平和不可得見衰乃見耳來如雀之如水之下漏是脾之衰見也呂曰脾寄王四季故不言王言平和脉不見其衰病見耳其脉見如屋之漏如雀之啄如水之下漏皆腎來乗脾故使衰病肝乘脾則死腎不勝脾故伹病也丁曰脾者成於四方故平常不見衰乃見如雀之啄如水之滴漏虞曰如水之漏乃是脾脉太過如雀之啄是謂脾脉不及太過則令人四支不舉不及則令人九竅不通故平和不可得見衰乃見也十六難曰脉有三部九候呂曰三部者寸關尺也九候者上部三候中部三候下部三候三三如九也丁曰三部者寸關尺也九􅀱者浮中沉也是一難之所演也虞曰三部法三才故有天地人三部之中亦各有天地人因而成九上部天以候頭􅊁上部之人以候耳目上部之地以候口齒中部之天以候肺中部之人以候心中部之地以候胸中之氣下部之天以候肝下部之人以候脾胃下部之地以候腎故曰三部九􅀱也有隂陽呂曰寸口者陽脉見九分而浮尺部者隂脉見一寸而沉丁曰隂陽者是二難尺寸皆隂陽前後上下之法也虞曰三部之中各有一隂一陽來者爲陽去者爲隂察陽者知病之所有察隂者知死生之期也有輕重呂曰肺如三叔之重是謂輕腎脉按之至骨如十五菽之重是謂重也丁曰輕重者是五難言輕重之法也虞曰凡切陽脉乃輕手取謂陽脉浮也切隂脉乃重手取謂隂脉沉也故曰輕重也有六十首呂曰首頭首也蓋三部從頭者脉輒有六十首丁曰六十首者是十難經一脉變爲十是也虞曰六十首者乃一脉變爲四時是也謂春脉弦夏脉鈎秋脉毛冬脉石季夏及四季脉緩逐四時之休王一脉變爲五十二經內成六十首也一脉變爲四時呂曰是手太隂之動以决四時逆順吉凶之法也丁曰十五難是言四時以胃氣爲本况經脉十二經謂脉隨四時之變換非手太隂也虞曰凡切脉始起於六脉謂浮沉長短滑濇也乃三隂三陽之脉也六脉趣四時之變故有二十四脉形焉今六十首乃備言手足三隂三陽合之爲十二脉隨弦鈎毛石變之爲時經合之爲六十脉故曰一脉變爲四時離聖久遠各自是其法何以别之呂曰言三部是一法九􅀱是一法隂陽是一法輕重是一法六十首是一法言法象無多難可分别故言之此難也丁曰離聖人久遠者爲越人時去聖逾遠也各自是其法者爲前所演其法也故曰各自是其法也然是其病有內外證呂曰法象無多或變爲四時難可分别故以中外别其病以名之難也丁曰是字當作視物之視上文言視病之法不與診法同故云别也然字者是越人自答之語也言使人視其精明五色循按察之左右卽知內外之證故知是字當作視物字用此是字傳冩之錯誤也虞曰一藏一府乃一表一裏府之病主於外故有外證藏之病主於內故有內證也其病爲之柰何然假令得肝脉虞曰肝脉弦軟而長其外證善潔面青善怒足少陽膽者府也故有病則見於外也又膽爲淸淨之府故善潔也主於外見靣靑也又膽爲中正之官主決斷故善其怒也其內證齊左有動氣按之牢若痛虞曰五積之候肝之積名曰肥氣在齊之左也其病四肢滿閉虞曰肝木脾土脾主四肢木病則土無所畏故四肢閉滿玉機眞藏論曰脾太過令人四肢不舉癃溲便難轉節有是者肝也無是者非也丁曰肝者東方木也其治在左應震齊左有動氣按之牢若痛其病四肢滿閉者謂支節攣嚲也淋􅂥難者足厥隂上係舌本下懷於隂器故淋溲便難也其轉筋者謂肝含血以養筋故病卽轉筋也有此内外證卽肝也無是者非也虞曰癃溲謂小府澁也便難大府所注難也謂肝脉循於隂器故癃溲也肝腎主下部肝病則氣逆不行於下故便難也肝屬木也木曰曲􅈂筋乃象之今肝病故轉筋也呂曰外證者府之􅀱膽者淸淨之府故面青善潔若衣被飮食不潔者其人便欲怒膽色靑故面靑怒也其內證者肝之證肝者東方爲靑龍在左方故肝之證在齊左假令得心脉其外證面赤口乾喜笑丁曰外證者手太陽之脉爲外經故有病卽見於外其應火故病卽外􅀬口乾喜笑是其外證也虞曰心脉浮大而散心屬火火性炎上故面赤口乾也心在聲爲笑也其內證齊上有動氣按之牢若痛其病煩心心痛掌中􅀬而啘有是者心也無是者非也丁曰心者南方火也其位在離故齊上有動氣其病煩心心痛掌中􅀬而啘者心病卽煩痛故啘臂內掌中􅀬而啘者是其內證也有其證者心之病無其證者卽非也虞曰心之積名曰伏梁在齊上火之生􅀬心爲五藏之君四藏有病心主知之尙有痛狀何况本經百病耶常痛乃心包脉也正心不受病病則且占夕死夕占且死重明受病則心包絡乃手厥隂之脉出兩手中指之端不入掌心屈名指取之穴名勞宮穴心包病則掌中􅀬而啘心呂曰外證者小膓手太陽脉爲􅀬故令口乾陽主躁故喜笑也其內證者心心在前爲朱雀故證在齊上也假令得脾脉虞曰脾脉中緩而大其外證面黃善噫丁曰其外證靣黃陽明爲胃之經故見色黃外之證也虞曰脾土也在變動爲噫善思虞曰脾者在志爲思也善味虞曰脾主甘受味故善味其內證當齊有動氣按之牢􅀂痛虞曰脾之積名曰痞氣當齊之中其病腹脹滿食不消體重節痛怠墮嗜臥四肢不収有是者脾也無是者非也丁曰内證者足太隂脾也當齊有動氣者脾主中州也其病腹滿食不消體重節痛怠墮嗜臥四肢不收皆爲土土靜故有此證前注言外證靣黃而不解餘􅀃者爲善噫善味者是脾也今腹脹滿食不消卽是胃也胃爲水榖之海病卽食不消體重節痛怠墮嗜臥四肢不􅀵皆是見外證也今却言内證也此經所說文至不明未敢盡注其􅀃以俟後賢虞曰濕氣勝則令人彭脹陽氣在下食乃不消得主內病則如是脾屬土土性安靜故知是土主四肢病乃四肢不收呂曰外證足陽明胃脉之證胃氣實榖氣消卽多所思欲飮食胃氣虛食不消氣力虛贏其人感思慮內證者脾也脾在中央故證當齊齊者又隂陽之中故其脉在脾也假令得肺脉其外證面白善􅅉悲愁不樂欲哭丁曰其外證者手陽明之經大膓爲肺之府也故善嚏悲愁不樂欲哭此外之證也虞曰肺脉浮短而濇面白乃金之色也肺主皮毛皮毛外感寒內合於肺故嚏也悲者肺之志也脾土肺金肺爲肺母脾主歌子病母憂故不樂在聲爲哭其內證齊右有動氣按之牢若痛其病喘欬洒淅寒􅀬有是者肺也無是者非也丁曰其言內證者手太隂之經應西方金在兌故言齊右有動氣也其爲喘欬洒浙寒􅀬者故知內證也虞曰肺之積名曰息賁在右脇下肺主皮毛今寒氣外感於皮毛內合於寒則氣道澁故喘而欬肺主氣外􅀱於皮毛肺虛則洒浙寒肺實則􅀬而悶故云寒􅀬也呂曰外證者大膓脉也乃手陽明之脉爲肺之府氣通於鼻故善􅅉肺主秋秋愁也故其病悲哭內證者肺之證肺主皮毛有寒則洒浙欬􅅉肺在西方爲白虎主右方故證在齊右假令得腎脉其外證面黑喜恐欠丁曰其外證者太陽膀胱之經故爲外經也故有病則色黑面黑喜恐欠也虞曰沉濡而滑腎之脉也黑色腎之色也在志曰恐巨陽虛則欠其内證齊下有動氣按之牢􅀂痛虞曰腎之積名曰賁脉在齊下故云在齊下其病逆氣少腹􅇥痛泄如下重足脛寒而逆有是者腎也無是者非也丁曰其內證者腎王於冬應北方故在齊之下也其病逆氣少腹􅇥痛泄如下重其泄者爲大瘕泄而裏急後重也此内之證也虞曰腎氣不足傷於衝脉故氣逆腎者足少陰之脉循少腹與足厥陰足太陰三隂交於齊下今病故少腹􅇥痛也五泄之􅀱腎爲後重泄腎者胃之關今氣虚故爲下重泄謂食畢思急圊足內踝上五寸間乃足少隂之動脉故足脛寒而逆通評虚實論曰氣逆者足寒也呂曰外證足太陽膀胱脉也其人善欠者其人善惡寒若脛寒身體酒洒而寒故其善欠腎與手少陽俱主􅀱心故善恐其內證者腎王於冬主北方玄武故證在齊下虞曰經言是其病有內外證推尋至此惟肝脉平證善潔二字是表證心脉不見手太陽外證脾脉中有善噫是外證肺脉亦無手陽明之證腎脉中只有欠一字是足太陽不足之證五藏推之黃帝素問並言皆只足藏之證也越人言其外證者取其形見於外也呂氏所注多不該經㫖十七難曰經言病或有死或有不治自愈或連年月不巳其死生存亡可切脉而知之耶然可盡知也診病若閉目不欲見人者脉當得肝脉强􅇥而長丁曰此是肝之病證故則强􅇥而長楊曰强􅇥猶弦急虞曰肝木之脉弦軟而長今見强􅇥病乃如是而反得肺脉浮短而濇者死也丁曰浮短濇者是肺脉此者今當勝木故知死也楊曰肝爲木肺爲金肝病得肺脉眞􅀑來尅金勝木故必死也病若開目而渇心下牢者脉當得緊實而數反得沉濡而㣲者死也丁曰心之病證今反見腎脉心火腎水水來尅火故知死也楊曰心病得腎脉水勝火故死也按之短實而數有似切繩謂之緊也按之短小不動搖若有若無輕手乃得重手不得謂之㣲也虞曰病開目而渇心下牢脉又緊實而數此曰陽病得陽脉脉不相反今見沉濡而㣲謂陽病得隂脉故曰死也病若吐血復􅍠衄血者脉當沉細而反浮大而牢者死也丁曰此者肺脉之病證今反見心脉心火肺金火來勝金故知死也虞曰血屬隂吐血衄血脉得沉細此謂脉與病相應今反浮大而牢與病相反故死也病若譫言妄語身當有􅀬脉當洪大而手足厥逆脉沉細而㣲者死也丁曰此病是心病之證今反手足厥脉沉細而㣲者是水勝火卽知死也楊曰按之遲但小謂之細虞曰肺主聲心主言今脉洪大是知􅀬乘於心肺邪受之故譫言妄語肺主皮毛今邪客於衛氣不得宣通乃身􅀬夫如是病與脉相應今手足厥逆脉沉細而㣲陽病得隂脉故云必死也病若大腹而􅂥者脉當㣲細而濇反緊大而滑者死也丁曰此病脾土之證候緊大滑者是肝木來勝土故知死也此經不言腎水之證闕此一藏也楊曰凡此五者病脉相反故爲必死經云五逆者死此之謂也虞曰濕氣勝則脹脾不禁故􅂥脉㣲細濇病脉相承緊大而滑此曰相反如此之候其死明矣十八難曰脉有三部部有四經手有太隂陽明足有太陽少隂爲上下部何謂也然手太隂陽明金也足少隂太陽水也金生水水流下行而不能上故在下部也丁曰夫脉有三部者寸關尺也􅀂合兩手言之卽六部也毎部之內各有二經六部之内合爲十二經今此云四經者是謂手太陽陽明與足太陽少隂此四經者法水火之性各有綱紀而不能變通上下餘八經在手生足在足生手所以經言部有四也是右手寸口肺與太陽應金生左尺水也足太陽少隂水其性潤下故不能上生於手而生左足厥隂少陽木此二部皆是足之經紀所以言在下部也是左尺水生左關木楊曰手太隂肺脉也肺爲諸藏上盖其治在右方故在右手上部也手陽明大膓脉是肺之府故隨肺居上部焉足少隂腎脉腎爲水肺之子水流􅃐於腎又最居於下故爲左手下部也足太陽膀胱爲腎之府故隨腎居下部焉經言脉有三部部有四經者謂總兩手而言之也兩手各有三部部各有二經兩手上部合四也中下二部亦復如此三四十二則十二經也肺金居上而下生腎水故肺腎在左右手上下部也足厥隂少陽木也生手太陽少隂火火炎上行而不能下故爲上部丁曰手太陽少隂應左寸君火火上炎上不能下生足而生手心主少陽火是生右尺相火也楊曰足厥隂肝脉也肝治在左方故爲左手之下部足少陽膽者爲肝之府故隨肝居下部也手太陽小膓脉爲心之府故隨心居上部焉手心主少陽火生足太隂陽明土土主中宮故在中部也丁曰是相火應其􅁅火也中部者右關也生右寸金也楊曰手心主心包絡脉也手少陽三焦脉也故合爲左手中部足太陰脾脉也足陽明胃脉也故合爲右手中部此經作如此分别若依脉經配二部又與此不同也虞曰經言手心主少陽火生足太隂陽明土土主中宮故在右手中部惟只言火生土之意不言手心主少陽在左手中部惟只取其相生言之也今明三部相生之意如此右手尺中少陽火生關上陽明土關上陽明土却生寸口太隂金寸口太隂金却生左手尺中少隂水左手尺中少隂水却生左手關上厥隂木關上厥隂木却生左手寸口少陰火却又别心主火故心主生足太隂陽明土也此乃五行相生之意耳又足厥隂與足太隂何以居於左右兩手關部中胃脾太隂脾脉居於中州乃在右手關上也又足厥隂木木者根生於地枝葉長於天亦隂陽共焉故亦在左中部也此皆五行子母更相生養者也丁曰言此皆五行更相生養者是謂右寸金生左尺水水生左關木木生左寸君火君火生右尺相火相火生右關土而後生右寸金故言子母更相生養者也脉有三部九候各何所主之然三部者寸關尺也九候者浮中沉也丁曰前順五行而言之生養卽逆三部而反到所以經别問各何所主也楊曰寸口陽也關中部也尺中隂也此三部各有浮中沉三候三三九候也故曰九浮爲陽沉爲隂中者胃氣也虞曰一部之中有三候浮者爲府沉者爲藏中者乃是中焦之脉也假令寸口浮爲府沉爲藏中爲中焦皆倣此用之上部法天主胸以上至頭之有疾也丁曰兩手寸口皆爲上部卽寸外主頭寸內主胸中是頭皆一指下前後言病左右同法也楊曰所謂自膈以上爲上焦也中部法人主膈以下至齊之有疾也丁曰言左右兩關也第二指半指以前言膈下半指之後主齊上左右同楊曰所謂自膈以下爲中焦也下部法地主齊以下至足之有疾也丁曰下部左右兩尺第三指半指之前主齊下有疾半指之後以候至足之有疾楊曰所謂自齊以下至足爲下焦也審而刺之者也丁曰刺字當作次第之次此是審三部各有內外主從頭至足之有疾也故知刺字傳文誤也楊曰用針者必當審詳三部九候病之所在然后各依其源而刺之也人病有沉滯久積聚可切脉而知之耶然診在右脇有積氣得肺脉結脉結甚則積甚結㣲則氣㣲診不得肺脉而右脇有積氣者何也然肺脉雖不見右手脉當沉伏丁曰病久積聚可切脉而知之者五藏六府皆有積聚今云右脇有積氣當肺脉見如是脉不見亦沉伏詳經之意脉浮行肉上腎脉沉行於筋下其浮行於肉上而無常數而止者名曰結也其沈行於筋下時上名曰伏也伏者藏病積也浮結者府病聚也兩手三部各有浮沈結伏而言病也今經引肺脉一經於此言之也楊曰徃來緩而時一止復來謂之結也脉結甚者是診脉之狀也結甚者此結訓積猶言脉結甚則積甚脉積微則積㣲其言積隱也虞曰結脉主塊積其脉動而中止小數有還反動故曰結也其積之大小隨診言之也楊曰診雖不得肺脉浮短而濇但左手脉當沈伏卽右脇有積氣矣肺治在右也極重指著骨乃得故謂伏脉也其外痼疾同法耶將異也然結者脉來去時一止無常數名曰結也伏者脉行筋下也浮者脉在肉上行也左右表裏法皆如此假令脉結伏者內無積聚脉浮結者外無痼疾有積聚脉不結伏有痼疾脉不浮結爲脉不應病病不應脉是爲死病也丁曰人心有所思慕脉亦結心無所思內外無病其脉伏結此者形不病而脉病故知死矣楊曰脉與病不相應爲逆者難治故曰是死病也舊經注云手心主心包絡脉也手少陽三焦脉也故合爲左手中部足太陰脾脉也足陽明胃脉也故合爲右手中部此經作如此分别若依脉經配三部又與此不同也舊經有此前注牴牾具列此圖以正其文楊氏曰手心主心包絡脉手少陽三焦脉也故合爲左手上部足太隂脾脉也足陽明胃脉也故合爲右手中部此經作如此分别若依脉經配三部又與此不同夫此法楊氏不能明其理故言不同也是師將三部反倒配合五行六氣而言之師謂此寸尺反倒又問三部各何所主經云上部法天主胸以上至頭有疾中部法人主膈下至齊上有疾下部法地主齊以下至足有疾故云審而次之者也又王叔和將自左寸逆行言之曰左心小膓肝膽腎右肺大膓脾胃命女人反此背看之尺脉第三同斷病蓋兩尺反倒同主齊以下至足有疾故扁鵲云審而次之王叔和云用心子細須尋趁手太陽少隂火火炎上而不能下生手手心主少陽相火生足太心主少陽火隂陽明土土足厥隂少陽復生金木木生火足太隂陽明手太陽少隂君火土土生手太足太陽少隂陽明金水水流下而手太隂陽明不能上行生金生足太足厥隂少陽陽少隂水木十九難曰經言脉有逆順男女有常而反者何謂也然男子生於寅寅爲木陽也女子生於申申爲金隂也楊曰元氣起於子人之所生也男從子左行三十之巳女從子右行二十俱至於巳爲夫婦懷姙也古者男子三十女年二十然後行嫁娶法於此也十月而生男從巳至寅左行爲十月故男行年起於丙寅女從巳右行至申爲十月故女行年起於壬申所以男子生於寅女子生於申虞曰經言男子生於寅女子生於申謂其父母之年㑹合於巳上男左行十月至寅而生女右行十月至申而生也小運人言男一歲起於丙寅女一歲起於壬申難經不言起而言生謂生下巳爲一歲矣丙壬二干水火也水火爲萬物之父母寅申二支金木也爲生物成實之終始木胞在申金胞在寅二氣自胞相配故用寅申也金生於巳巳與申合故女子取申木生於亥亥與寅合故男子取寅所以男年十歲順行在亥女年七歲逆行亦在亥男年十六天癸至左行至巳巳者申之生氣女年十四天癸至右行亦在巳與男年同在本宮生氣之位隂陽相配乃成夫婦之道故有男女也上古天眞論曰男二八而天癸至精氣溢㵼陰陽和故能有子楊氏言男三十行年在巳方娶於此非也女二十天癸至任脉通衝脉盛月事以時下故能有子楊氏言女二十右行之巳方嫁於此義非矣楊氏之言但合古禮行夫婦嫁娶之法又與本經天癸之數相違也况聖人於此十九難中論男女配合之道隂陽交㑹之所言天癸之至數知脉盛於上下推之强弱診其有餘不及若止言三十而娶二十而嫁於本經診治之道慿何依據故男脉在關上女脉在關下是以男子尺脉恒弱女子尺脉恒盛是其常也丁曰其言男子女人尺脉者是隂陽之根本也逆順者爲陽抱隂生隂抱陽生也三陽始生於立春建寅故曰男生於寅木陽也三隂生於立秋七月建申故言女生於申金隂也男子之氣始於少陽極於太陽所以男子尺脉恒弱而寸脉陽也女子之氣始於太隂極於厥隂女子尺脉浮而寸脉沈故云男脉在關上女脉在關下此是男女逆順有常而反也楊曰男子陽氣盛故尺脉弱女子隂氣盛故尺脉强此是其常性反者男得女脉女得男脉也其爲病何如然男得女脉爲不足病在內左得之病則在左右得之病則在右隨脉言之也女得男脉爲太過病在四肢左得之病則在左右得之病則在右隨脉言之此之謂也丁曰男得女脉言不足者是隂不足卽陽入乗之故陽不見於寸口而反見尺內隂氣主內不足故知病也卽在內女得男脉爲太過病在四肢者女子尺脉本浮更加見於寸是謂太過陽主外故病在四肢隨其脉左右言之左得之病在左右得之病在右也楊曰男得女脉爲隂氣盛隂主內故病在內女得男脉爲陽氣盛主四肢故病在四肢也虞曰寸口曰陽男以陽用事今見陰脉反於天常故病􅀤於脉女以隂用事今寸口却見陽脉亦是反於天常故病在四肢素問曰四支爲諸陽之本也王翰林集註黃帝八十一難經卷之二音釋十三難臭只救切十四難奪徒活切中霧上音衷槀苦老切十五難厭益渉切聶之渉切操七刀切藹於蓋切兌音銳尖也啄許檅切啄呼角切解胡介切十六難别波列切溲所鳩切啘之月切噫鳥介切􅅉丁計切樂音樂浙音息脛形定切十七難􅍠音求鼻寒而淸涕岀也衄女六切鼻中出血也譫之閻切多語也􅂥音泄十八難脇虛業切胸脇也痼音故久病也十九難姙而鴆切恒音常久也
