body:
  text: 集註難經序黃帝八十一難經者斯乃勃海秦越人之所作也越人受桑君之秘術遂洞明醫道至能徹視藏府刳腹剔心以其與軒轅時扁鵲相類乃號之爲扁鵲又家於盧國因命之曰盧醫世或以盧扁爲二人者斯實謬矣按黃帝有內經二帙帙各九卷而其義幽􅄨殆難窮覽越人乃採摘英華抄撮精要二部經內凡八十一章勒成卷軸伸演其首探㣲索隱傳示後昆名爲八十一難以其理趣深遠非卒易了故也旣弘暢聖言故首稱黃帝斯乃醫經之心髓救疾之樞機所謂脫牙􅊁於象犀収羽毛於翡翠者矣逮于吳太醫令呂廣爲之注解亦會合玄宗足可垂訓而所釋未半餘皆見闕余性好醫方問道無倦斯經章句特承師授旣而躭研無斁十載于茲雖未達其本源葢亦舉其綱目此敎所興多歷年代非唯文句舛錯抑亦事緒參差後人傳覽良難領會今輒條貫編次使􅀋例相從凡爲一十三篇仍舊八十一首吕氏未解今並註釋呂氏注不盡因亦伸之並别爲音義以彰厥㫖昔皇甫玄晏總三部爲甲乙之科近世華陽陶貞白廣肘後爲百一之製皆所以留情極慮濟育羣生者矣余今所演葢亦遠慕高仁邇遵盛德但恨庸識有量聖旨無涯綆促汲深玄致難盡前歙州歙縣尉楊玄操序集註難經目錄第一經脉診􅀱凡二十四首第二經絡大數凡二首第三竒經八脉凡三首第四滎衞三焦凡二首第五藏府配像凡六首第六藏府度數凡十首第七虛實邪正凡五首第八藏府傳病凡二首第九藏府積聚凡二首第十五泄傷寒凡四首第十一神聖工巧凡一首第十二藏府井兪凡七首第十三用鍼補㵼凡十三首
