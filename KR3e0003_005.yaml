  text: 王翰林集注黃帝八十一難經卷之五
  hash: sha256:0e15a55033c7413d6860e68672fc2af9d6ab4af528296bcdd36b85be22ddd9a1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0003_SBCK_005-1a}
body:
  text: 盧國秦越人撰呂廣丁德用楊玄操虞庶楊康侯注解王九思王鼎象石友諒王惟一校正附音釋六十四難曰十變又言隂井木陽井金陰榮火陽榮水隂俞土陽俞木隂經金陽經火隂合水陽合土陰陽皆不同其意何也然是剛柔之事也隂井乙木陽井庚金陽井庚庚者乙之剛也隂井乙乙者庚之柔也乙為木故言隂井木也庚為金故言陽井金也餘皆倣此丁曰經言剛柔者謂陰井木陽井金庚金為剛乙木為柔隂榮火陽榮水壬水為剛丁火為柔隂俞土陽俞木甲木為剛巳土為柔隂經金陽經火丙火為剛辛金為柔隂合水陽合土戊土為剛癸水為柔楊曰五藏皆為隂隂井為水榮為火俞為土經為金合為水六府為陽陽井為金榮為水俞為木經為火合為土以隂井木配陽井金是隂陽夫婦之義故云乙為庚之柔庚為乙之剛餘並如此也虞曰所尅者為妻謂孤陽不生孤隂不長故井榮亦名夫婦剛柔相因而成也六十五難曰經言所出為井所入為合其法奈何楊曰奈何猶如何也然所出為井井者東方春也萬物之始生故言所出為井也所入為合合者北方冬也陽氣入藏故言所入為合也丁曰人之陽氣隨四時而出入故春氣在井夏在榮秋在經冬在合其所取氣穴皆隨四時而刺之也楊曰春夏主生飬故陽氣在外秋冬主收藏故陽氣在內人亦法之六十六難曰經言肺之原出于太淵丁曰在右手掌後魚際下是脈之大會故云肺之原出于太淵楊曰穴在掌後是也虞曰針經言五藏有俞無原原與俞共一穴所出難經又言五藏有原所出乃亦針經中俞穴也兩義皆通也心之原出于太陵丁曰在掌後兩筋間陷中此是心包絡之原也虞曰在掌後兩骨間肝之原出于太衝虞曰在足大指本節後二寸是又曰足大指本節後二寸或一寸半是也脾之原出于太白丁曰在足內側核骨下腎之原出于太溪丁曰在足內踝後跟骨間是也少隂之原出于兌骨丁曰神門穴是也此是真心之脈也楊曰此皆五藏俞也所以五藏皆以俞為原少隂真心脈也亦有原在掌後兌骨端陷者中一名神門一名中都前云心之原出于太陵者是心胞絡脈也凡云心病者皆在心胞絡脈矣真心不病故無俞今有原者外經之病不治內藏也膽之原出于丘墟丁曰在足外踝下微前是也楊曰足內踝後微前也胃之原出于衝陽丁曰在足跗上五寸骨間動脈是也三焦之原出于陽池丁曰在手小指次指本節後陷中是也楊曰手表腕上也膀胱之原出于京骨丁楊曰在足外側大骨下赤白肉際大腸之原出于合谷丁曰在大指次指間虎口內楊曰手大指岐骨間小腸之原出于腕骨丁曰在小指腕骨內楊曰在手腕陷中指腕者誤也虞曰以上十二經皆配之五行其二行行勝之年於王前先㵼其原不足之年先補其原即此原也十二經皆以俞為原者何也然五藏俞者三焦之所行氣之所留止也三焦所行之俞為原者何也然臍下腎間動氣者人之生命也十二經之根本也故名曰原三焦者原氣之别使也主通行三氣經歷於五藏六府原者三焦之尊號也故所止輒為原五藏六府之有病者取其原也楊曰齊下腎間動氣者丹田也丹田者人之根本也精神之所藏五氣之根元太子之府也男子以藏精女子主月水以生養子息合和隂陽之門戶也在齊下三寸方圓四寸附著脊脈兩腎之根其中央黃左靑右白上赤下黑三寸法三才四寸法四時五色法五行兩腎之間名曰大海一名溺水中有神龜呼吸元氣流行則為風雨通氣四肢無所不至也腎者分為日月之精虛無之氣人之根本也齊者人之命也分為一名太中極一名太涃一名崑崙一名持樞一名五城五城有真人即五常也五城之外有八使者即八卦神也八使者井太一為九鄉八卦之外有十二樓樓有十二子也并三焦神為二十七大夫又并四支神為八十一元土齊中央名太一君之侯王王天大將軍特進侯主人身中萬二千神也效在頭上腦戶中廟在項後頂上社在脾左端稷在太腸窮風伯在八門八門在齊傍兩師在小腸窮四瀆雲氣在崑崙溺水在胞中所以備言此者欲明腎為人生之本焉故知丹田者性命之本也道士思神比丘坐禪皆行心氣於臍下者良為此也故云原者三焦之尊號也三焦合氣於腎故也虞曰在天則三元五運相因而成在人則三焦五藏相因而成也素問曰其氣三其生五此之謂也啓玄子曰人之所存秉五行之運用徵其本始從三氣以生成此則天地之原氣也故五藏六府有病皆取其原也丁曰三焦者是十二經根本是生氣之原也為臣使之官宣行榮衛所以在陽經輒有其原也六十七難曰五藏募皆左隂而俞在陽者何謂也然隂病行陽陽病行隂故令募在陰俞在陽丁曰人背為陽腹為隂是言五藏俞皆有陽者背俞也故肺俞二穴在第三椎下兩傍相去同身寸之一寸五分是也心俞二穴在第五椎下兩傍相去同身寸之一寸五分是也肝俞二穴在第九椎下兩傍相去同身寸之一寸五分是也脾俞二穴在第十一椎下兩傍相去同身寸之一寸五分是也腎俞二穴在第十四椎下兩傍相去同身寸之一寸五分是也肺之募中府二穴在雲門下一寸乳上三肋間是也心之募巨闕一穴在鳩尾下一寸是也脾之募章門二穴在季脅下直齊是也肝之募期門二穴在不容兩傍一寸五分是也腎之募京門二穴在腰中季脅本是也楊曰腹為隂五藏之募皆在腹故云募皆在陰背為陽五藏之俞皆在背故云愈皆在陽內藏有病則出行於陽陽俞在背也外體有病則入行於隂隂募在腹也故針法云從陽引隂從隂引陽此之謂也六十八難曰五藏六府各有井榮俞經合皆何所主然經言所出為井所流為榮所注為俞所行為經所入為合井主心下滿呂曰井者木木者肝肝主滿也虞曰井法木以應肝脾位在心下今邪在肝肝乘脾故心下滿今治之於井不令木乘土也榮主身熱呂曰榮者火火者心心主身熱也虞曰榮為火以法心肺屬金外主皮毛今心火灼於肺金故身熱謂邪在心也故治之於榮不令火乘金則身熱必愈也俞主體重節痛呂曰俞者土土者脾脾主體重也虞曰俞者法土應脾今邪在土土必刑水水者腎腎主骨故病則節痛邪在土土自病則體重宜治於俞穴經主喘咳寒熱呂曰經者金金主肺肺主寒熱也虞曰經法金應肺今邪在經則肺為病得寒則咳得熱則喘今邪在金金必刑木木者肝肝在志為怒怒則氣逆乘肺故喘何以然謂肝之支别從肝别貫膈上注肺脈要精微論曰血在脅下令人喘逆此之謂也治之於經則金不刑於木矣合主逆氣而泄呂曰合者水水主腎腎主泄也虞曰合法水應腎腎氣不足傷於衝脈則氣逆而裏急腎主開竅於二隂腎氣不禁故泄注邪在水水必乘火火者心法不受病肝木為心火之母為腎水之子一憂母受邪二憂子被刑肝在志為怒憂則怒怒則氣逆故也此五行更相乘剋故病有異同今治之於合不令水乘火則肝木不憂故氣逆止邪不在腎則無注泄以上井榮俞經合法五行應五藏邪湊其中故主病如是善診者審而行之則知自病或相乘虛則輔之實則㵼之此五藏六府其井榮俞經合所主病也丁曰此是五藏井榮俞經合也經言井主心下滿者為肝病即逆滿當取其諸井以主其心下滿也榮主身熱者榮者火也故身熱當取其諸榮以主其熱也俞主體重節痛俞者土也故令體重節痛當取其諸俞以主其體重節痛也經主喘咳寒熱經者金也故喘咳而發寒熱當取其諸經以主其喘咳寒熱也合主逆氣而泄合為水水主泄當取其諸合以主逆氣而泄也虞曰以上井榮愈經合之生病各依四時而調治之謂四時之邪各湊榮俞中留止也用針輔㵼第十三凡十三首六十九難曰經言虛者補之實者㵼之不實不虛以經取之何謂也然虛者輔其母實者㵼其子當先補之然後㵼之不實不虛以經取之者是正經自生病不中他邪也當自取其經故言以經取之丁曰此經先立井榮俞經合配象五行即以十二經中各有子母遞相生飬然後言用針補㵼之法也假令足厥隂肝之絡中虛即補其足厥隂經合是毋也實即㵼足厥陰經榮是子也如無他邪即當自取其經故言以經取之也楊曰春得腎脈為虛邪是腎虛不能傳氣於肝故補腎腎有病則傳之於肝肝為腎子故曰補其母也春得心脈為實邪是心氣盛實逆來乘肝故㵼心心平則肝氣通肝為心母故曰㵼其子也不實不虛是諸藏不相乘也春得弦多及但弦者皆是肝藏自病也則自於足厥隂少陽之經而補㵼焉當經有金木水火土隨時而取之也七十難曰經言春夏刺淺秋冬刺深者何謂也然春夏者陽氣在上人氣亦在上故當淺取之秋冬者陽氣在下人氣亦在下故當深取之丁曰春夏刺淺秋冬刺深者經言春夏刺井榮從肌肉淺薄之處秋冬刺經合從肌肉深厚之處此是四時隨所在刺之也楊曰經言春氣在毫毛夏氣在皮膚秋氣在分肉冬氣在筋骨此四時之氣也其四時受病亦各隨正氣之深淺故用針者治病各依四時氣之深淺而取之也春夏各致一隂秋冬各致一陽者何謂也然春夏溫必致一隂者初下針沈之至腎肝之部得氣引持之隂也虞曰經言春夏養陽言取一隂之氣以養於陽慮成孤陽致者到也及也言到於腎肝引持一隂之氣肝腎乃隂也秋冬寒必致一陽者𥘉內針淺而浮之至心肺之部得氣推內之陽也虞曰經言秋冬養隂言至隂用事無陽氣以養其隂故取一陽之氣以養於隂免成孤隂也心肺乃陽也故言至心肺之部也是謂春夏必致一隂秋冬必致一陽楊曰入皮三分心肺之部陽氣所行也入皮五分腎肝之部陰氣所行也陽為衛隂為榮春夏病行於陽故引隂以和陽秋冬病行於隂故內陽以和隂也虞曰楊氏所注言三分為心肺之部五分為肝腎之部此乃玄珠密語分天地氣而言之故有三分五分之説也丁曰人之肌膚皆有厚薄之處但皮膚之上為心肺之部陽氣所行肌肉之下為腎肝之部隂氣所行其春夏陽氣上騰所用針沉手內針至腎肝之部得氣引持隂氣以和其陽氣故春夏必致一陰也秋冬隂氣下降所用針浮手至心肝之部得氣推內針入引持陽氣以和其隂氣也故秋冬必致一陽也所以經云春夏必致一隂秋冬必致一陽也七十一難曰經言刺榮無傷衛刺衛無傷榮何謂也然針陽者臥針而刺之刺隂者先以左手攝按所針榮俞之處氣散乃內針是謂刺榮無傷衛刺衛無傷榮也丁曰人之榮為隂衛為陽二者為之表裏其卧針取之恐傷於榮也針榮先以左手攝按所刺之穴令陽散而內針者蓋恐傷於衛也楊曰入皮三分為衛氣病在衛用針則淺故臥針而刺之恐其深傷榮氣故也入皮五分為榮氣故先按所針之穴待氣散乃內針恐傷衛氣故也虞曰三隂三陽各主氣血至有多少不同故聖人説行針之道無令至有傷於榮衛也血氣形志篇曰太陽多血少氣少陽少血多氣陽明多氣多血厥隂多血少氣少隂多氣少血太隂多氣少血啓玄子注曰血氣多少天之常數故用針之道常㵼其多也七十二難曰經言能知迎隨之氣可令調之調氣之方必在隂陽何謂也然所謂迎隨者知榮衛之流行經脈之往來也隨其逆順而取之故曰迎隨調氣之方必在隂陽者知其內外表裏隨其隂陽而調之故曰調氣之方必在隂陽丁曰夫榮衛通流散行十二經之內即有始有終其始自中焦注手太隂一經一絡然後注手陽明一經一絡其經絡有二十四日有二十四時皆相合此凡氣始至而用針取之名曰迎而奪之其氣流注終而內針出而捫其穴名曰隨而濟之又補其毌亦名曰隨而輔之㵼其子亦名曰迎而奪之又隨呼吸出內其針亦曰迎隨也此者是調隂陽之法故曰必在隂陽也楊曰榮氣者常行不巳衛氣者晝行於身體夜行於藏府迎者逆也隨者順也謂衛氣逆行榮氣順行病在陽必候榮衛行至於陽分而刺之病在隂必候榮衛行至於隂分而刺之是迎隨之意也又迎者㵼也隨者補也故經曰迎而奪之安得無虛言㵼之則虛也隨而濟之安得無實言補之則實也調氣之方必在隂陽者陰虛陽實則補隂㵼陽陽虛隂實則補陽㵼隂或陽並於隂隂並於陽或隂陽俱虛或隂陽俱實皆隨病所往而調其隂陽則病無不巳虞曰迎取也乃五行六氣各有勝復假令木氣有餘之年於王前先㵼其化源玄珠密語曰木之行勝也蒼埃先見於林木木乃有聲宫音失調倮蟲不滋濕雨失合先於十二月㵼其化源故曰迎也不足之年輔於化源故曰隨也調氣之方必在隂陽者言引外至內引內至外也謂月生無㵼月滿無輔定人之呼吸觀日之寒溫從陽引陰從隂引陽春夏致一隂秋冬致一陽故曰調氣之方必在隂陽也知其內外表裏者謂察脈之浮沈識病之虛實以外知內視表知裡故曰知其內外表裏也隨其隂陽而調之者謂各隨病在何隂陽脈中而調治之也七十三難曰諸井者肌肉淺薄氣少不足使也刺之奈何然諸井者木也榮者火也火者木之子當刺井者以榮㵼之故經言補者不可以為㵼㵼者不可以為輔此之謂也丁曰諸井在手足指稍故言肌肉淺薄也井為木是火之母榮為火是木之子故肝木實㵼其榮肝木氣虛不足補其合㵼之復不能補故言不可以為補也楊曰冬刺井病在藏取之井應刺井者則㵼其榮以去其病故經曰冬隂氣緊陽氣伏故取井以下隂氣逆取榮以通陽氣也虞曰不至而至故春乃㵼榮也七十四難曰經言春刺井夏刺榮季夏刺俞秋刺經冬刺合者何謂也然春刺井者邪在肝夏刺榮者邪在心季夏刺俞者邪在脾秋刺經者邪在肺冬刺合者邪在腎丁曰其言春刺井者謂邪在肝無令肝木邪害於脾土故刺諸井也夏刺榮者謂邪在心無令心火邪害於肺金故刺諸榮也季夏刺俞者謂邪在脾無使脾土邪害於腎水故刺諸俞也秋刺經者謂邪在肺無令肺金邪害於肝木故刺諸經也冬刺合者謂邪在腎無令腎水邪害於心火故刺諸合也此是斷五邪之原法也楊曰用針微妙法無窮若不深達變通難以救疾者矣至如此説則是變通之義也經云冬刺井春刺榮此乃云春刺井夏刺榮理極精竒特宜留思不可固守以一槩之法也虞曰春刺井夏刺榮季夏刺俞秋刺經冬刺合乃經之大法也七十三難以言春刺於榮此乃休王未畢火奪木王法日實邪故㵼之於榮所以經言㵼者不可以為輔也其肝心脾肺腎而繫於春夏秋冬者何也然五藏一病輒有五也假令肝病色靑者肝也臊臭者肝也喜酸者肝也喜呼者肝也喜泣者肝也其病衆多不可盡言也四時有數而並繫於春夏秋冬者也針之要妙在於秋毫者丁曰人之五藏繫於四時五藏一病輒有五者謂五聲五色五味五液五香五臭若持針者皆能斷其五邪令中病源故知針之要妙在於秋毫不可不通也楊曰五藏六府病各有肜證今略舉肝家一藏以為法爾雖言春刺井夏刺榮若一藏有病脈亦隨之診而取之假令肝自病實則取肝中火㵼之虛則取肝中木輔之餘皆倣此即秋毫微細之意也言用針微細若秋毫矣虞曰五藏各有聲色臭味液以為形證以合四時井榮俞經合而行補㵼之法也微妙之理若秋毫之在目也七十五難曰經言東方實西方虛㵼南方補北方何謂也然金木水火土當更相平東方木也西方金也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之東方肝也則知肝實西方肺也則知肺虛㵼南方火補北方水南方火火者木之子也北方水水者木之母也水勝火子能令母實母能令子虛故㵼火補水欲令金不得平木也經曰不能治其虛何問其餘此之謂也丁曰四方者五行之正位也其王應四時即春應東方木夏應南方火秋應西方金冬應北方水長夏應中央土南方火實勝西方金即北方水來復勝火水且待爭反害於肺今當先㵼南方火實即還北方水肺金得平也平者調四方虛實之法也楊曰五行以勝相加故木勝土金勝木木肝也金肺也肺氣虛弱肝氣強實木反陵金金家不伏欲來平木金木若戰二藏則傷故用針者診知其候則須㵼心心氣既通肝氣則復又補於腎腎家得氣傳而養肝肝氣已定則肺不復來平肝然後却補脾氣脾是肺毋毋氣傳子子便安定故曰不能治其虛何問其餘此之謂也一本説楊氏曰金剋木今據肝家一條以例五藏假令東方木肝實西方金肺虛肝木實陵肺金虛金本剋木木伏金肝欲制肺肺乃不伏二藏爭勝反害於火宜㵼其心心屬火火者木之子子氣既通肝虛則伏肝氣既復則肺不復來然後補其脾脾是肺母母氣授子子氣便實故言母能令子實子能令母虛不能治其虛何問其餘虞曰五藏五行更相平伏宜慿補㵼以調治之素問曰邪氣盛則實真氣奪則虛以下凡有虛實皆準此也經言木實金虛㵼火輔水也夫木實者謂木有餘則土遙畏之土畏之則金無所飬而令金虛也若不㵼火火必盛而爍金金乃仇讎於木金木相勝而致兩相刑剋故㵼火火者木之子子合母氣木亦不實火亦不平金土亦無所畏乃行氣飬於金也金虛者乃補水禦火補水養木禦火火不平金養木木亦安復故曰子能令母實也木有餘則土乃畏木土不能傳氣與金金乃虛故曰母能令子虛也七十六難曰何謂補㵼當補之時何所取氣當㵼之時何所置氣然當輔之時從衛取氣虞曰肺行五氣溉灌五藏通注六經歸於百脈凡取氣須自衛取氣得氣乃推內針於所虛之經脈淺深分部之所以補之故曰當補之時從衛取氣此之謂也當㵼之時從榮置氣虞曰邪在榮分故內針於所實之經待氣引針而㵼之故曰當㵼之時從榮置氣置者取也迎也其陽氣不足隂氣有餘當先補其陽而後㵼其陰虞曰假令膽不足肝有餘先補足少陽而後㵼足厥隂也隂氣不足陽氣有餘當先補其隂而後㵼其陽虞曰反於上法榮衛通行此其要也楊曰此是隂陽更虛更實之變須通榮衛病則愈也丁曰其當輔之時從衛取氣衛者陽也故從衛取氣方其補也當㵼之時從榮置氣榮者隂也故從榮置氣置榮而後㵼之隂陽有餘不足當先補其不足然後㵼其有餘故得榮衛通行即是持針之要妙故言其要也七十七難曰經言上工治未病中工治巳病者何謂也然所謂治未病者見肝之病則知肝當傳之與脾故先實其脾氣無令得受肝之邪故曰治未病焉中工治巳病者見肝之病不曉相傳但一心治肝故曰治巳病也丁曰素問曰春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春此四時五行相勝之理也人之五藏有餘者行勝不足者受邪上工先補不足無令受邪而後㵼有餘此是治未病也中工持針即使㵼有餘故言治巳病也楊曰五藏得病皆傳其所勝肝病傳脾之類是也若當其王時則不受傳即不須行此方也假令肝病當傳脾脾以季夏王正王則不受邪故不須實脾氣也若非季夏則受肝邪便當預令實脾氣勿令得受肝邪也如此者謂之上工工猶妙也言妙達病源者也其中工未能全解故止守一藏而巳七十八難曰針有補㵼何謂也然輔㵼之法非必呼吸出內針也楊曰補者呼則出針㵼者吸則內針故曰呼吸出內針也虞曰謂用針補㵼之法呼吸取生成之數為之然知為針者信其左不知為針者信其右當刺之時必先以左手厭按所針榮俞之處彈而努之爪而下之其氣之來如動脈之狀順針而刺之得氣因推而內之是謂輔動而伸之是謂㵼不得氣乃與男外女內不得氣是謂十死不治也楊曰凡欲下針之法先知穴處便以左手按之乃以右手彈其所按之處脈動應於左手之下仍即以左手指按之然後循針而刺之待氣應於針下因推入榮中此是補也若得氣便搖轉而出之此是㵼也若久留針而待氣不至則於衛中留針待氣久不得又內入於榮中久留待氣如其三處候氣不應於針者為隂陽俱盡不可復針如此之候十人十死故云十死不治衛為陽陽為外故云男外榮為隂隂為內故云女內也虞曰自衛得氣推之於所虛之分開穴出針曰輔也自榮取氣引針開穴出針曰㵼也候吸內針呼盡出針曰先補後㵼反此行之則曰先㵼後補也玄密珠語稱其補㵼法云按之得氣內於天部天部得氣推之至地部天地氣相接則出針曰㵼反此行之曰補與此義相反丁曰知為針者信其左謂左手先按所刺之穴以其氣來如動脈而應其手即內其針亦是迎而奪之為之㵼氣過而順針而刺之是為隨而濟之也其男子陽氣行於外女人隂氣外於內男子則輕手按其穴女子則重手按其穴過時而氣不至不應其左手者皆不可刺之也刺之則無功謂氣絶故十死不治也何得留針而候氣也七十九難曰經言迎而奪之安得無虛隨而濟之安得無實虛之與實若得若失實之與虛若有若無何謂也然迎而奪之者㵼其子也隨而濟之者輔其母也假令心病㵼手心主俞虞曰心病却㵼手心主俞心者法不受病受病者心包絡也手心主者則手厥隂心包絡也包絡中俞者土也心火也土是火子乃㵼其俞此乃㵼子也是謂迎而奪之者也虞曰迎謂取氣奪謂㵼氣也補手心主井是謂隨而濟之者也虞曰心火井木今輔心主之井謂補母也木者火之母也隨謂自衛取氣濟謂補不足之經所謂實之與虛者牢濡之意也虞曰牢濡虛實之意也氣來實者為得濡虛者為失故曰若得若失也楊曰此是當藏自病而行斯法非五藏相乘也丁曰五藏虛即補其母是謂隨而濟之實即㵼其子是謂迎而奪之况欲行其輔㵼即先候其五藏之脈及所刺穴中如氣來牢實者可㵼之虛濡者可補之若持針不能明其牢濡者故若得若失也八十難曰經言有見如入有見如出者何謂也然所謂有見如入者謂左手見氣來至乃內針針入見氣盡乃出針是謂有見如入有見如出也丁曰欲刺人脈先以左手候其穴中之氣其氣來而內針候氣盡乃出其針者非迎隨㵼補之穴也謂不虛不實自取其經施此法也楊曰此還與彈而努之爪而下之相類也八十一難曰經言無實實虛虛損不足而益有餘是寸口脈耶將病自有虛實耶其損益奈何然是病非謂寸口脈也謂病自有實虛也假令肝實而肺虛肝者木也肺者金也金木當更相平當知金平木假令肺實而肝虛微少氣用針不㵼其肝而反重實其肺故曰實實虛虛損不足而益有餘此者中工之所害也丁曰中者傷也謂昧學之工不能明其五藏之剛柔而針藥誤投所以反增其害十人全八能知二藏也令肝虛肺實二藏之病全六反增其害也楊曰上工治未病知其虛實之原故輔㵼而得其宜中工未審傳病之本所治反增其害也王翰林集注黃帝八十一難經卷之五音釋六十七難募音暮六十八難厭益涉切
